    function buildBonusLevel() {
        const scene = new Scene('BonusLevel');
        const mapW = 80;
        const groundRow = 13;

        // School hallway background — warm indoor colors
        const bgFill = new Node('BGFill');
        bgFill.drawUI = function(ctx) {
            // Hallway gradient
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(0, 0, engine.width, engine.height);
            // Floor shine
            ctx.fillStyle = 'rgba(255,200,100,0.05)';
            ctx.fillRect(0, engine.height * 0.7, engine.width, engine.height * 0.3);
        };
        scene.addChild(bgFill);

        // Tilemap — flat school hallway, mostly flat with some steps
        const tilemap = new TileMap('Level');
        tilemap.imageName = 'tiles';
        tilemap.tileWidth = 16; tilemap.tileHeight = 16;
        tilemap.columns = 4;
        tilemap.create(mapW, 17, -1);
        tilemap.addGround(groundRow, 0, mapW - 1, 0, 1);

        // A few small platforms (lockers, benches)
        for (let c = 10; c < mapW - 10; c += 15) {
            tilemap.addPlatform(groundRow - 2, c, 3, 2);
        }

        tilemap.addWall(0, 0, 8, 1);
        tilemap.addWall(mapW - 1, 0, groundRow, 1);
        tilemap.collisionTiles = new Set([0, 1, 2, 3]);
        scene.addChild(tilemap);

        // Player
        const player = createMatt(scene);

        // === SODA KIDS — the core mechanic ===
        // Kids holding soda. Matt walks near them → swipes soda → gives milk
        let kidsHelped = 0;
        const totalKids = 12;
        const kidLines = [
            "I feel so much better!",
            "Whoa this milk SLAPS!",
            "My brain feels... CLEAR?!",
            "I can see sounds now!",
            "Is this what health feels like?!",
            "RAW MILK SUPREMACY!",
            "I just got an A on my test!",
            "Tell Mr. Kennedy I said thanks!",
            "My mom is gonna freak out!",
            "I can do a backflip now!!",
            "This is better than Mountain Dew!",
            "I feel like a NEW PERSON!",
            "My acne just VANISHED!",
            "I grew 2 inches!",
            "I can hear colors!",
            "GAINS! PURE GAINS!",
        ];

        // CLAIRVOYANCE: Kids run away when Matt gets close (creates chase gameplay)
        // Matt must press X (attack/Bible) within range to swipe soda and give milk
        // Combo system: helping kids in quick succession gives bonus score
        let comboCount = 0;
        let comboTimer = 0;

        function createSodaKid(scene, x, y, kidIdx) {
            const kid = new Area2D(`Kid${kidIdx}`);
            kid.position = { x, y };
            kid.collider = { x: -12, y: -20, width: 24, height: 28 };
            kid._helped = false;
            kid._showLine = false;
            kid._lineTimer = 0;
            kid._line = kidLines[kidIdx % kidLines.length];
            kid._bobTime = Math.random() * 6;
            kid._kidColor = ['#ff6666','#6688ff','#66ff66','#ffaa44','#ff66ff','#66ffff','#ffff66','#ff8866','#88ff88','#8888ff','#ff88ff','#88ffff'][kidIdx % 12];
            kid._origX = x;
            kid._fleeing = false;
            kid._fleeDir = 1;
            kid._fleeTimer = 0;
            kid._scared = false;
            kid._scaredTimer = 0;
            // CLAIRVOYANCE: stagger kid behavior — some are brave, some run fast
            kid._fleeSpeed = 30 + (kidIdx % 4) * 10; // 30-60 px/s
            kid._detectRange = 50 + (kidIdx % 3) * 15; // 50-80px detect range
            kid._flashTimer = 0;

            kid.update = function(dt) {
                if (this._helped) return;

                // CLAIRVOYANCE: combo timer decay
                comboTimer -= dt;
                if (comboTimer <= 0) comboCount = 0;

                // Find player
                const playerNode = scene.findChild('Player');
                if (!playerNode) return;
                const dx = playerNode.position.x - this.position.x;
                const dist = Math.abs(dx);

                // CLAIRVOYANCE: Kids notice Matt approaching (telegraph)
                if (dist < this._detectRange * 1.5 && !this._scared) {
                    this._scared = true;
                    this._scaredTimer = 0;
                }

                // CLAIRVOYANCE: Kids flee when Matt is close
                if (dist < this._detectRange && !this._fleeing) {
                    this._fleeing = true;
                    this._fleeDir = dx > 0 ? -1 : 1; // Run away from Matt
                    this._fleeTimer = 0;
                }

                if (this._fleeing) {
                    this._fleeTimer += dt;
                    // Run for 1.5 seconds then stop (catch your breath)
                    if (this._fleeTimer < 1.5) {
                        this.position.x += this._fleeDir * this._fleeSpeed * dt;
                        // Clamp to level bounds
                        this.position.x = Math.max(32, Math.min((mapW - 4) * 16, this.position.x));
                    } else if (this._fleeTimer > 2.5) {
                        this._fleeing = false; // Reset — can flee again
                    }
                }

                // CLAIRVOYANCE: Check if player is pressing X (attack) while in range
                if (dist < 28 && (engine.input.isKeyDown('KeyX') || engine.input.isKeyDown('KeyJ') || engine.input.isKeyDown('gamepad_x') || engine.input.isKeyDown('gamepad_rb'))) {
                    this._helped = true;
                    this._showLine = true;
                    this._lineTimer = 0;
                    this._fleeing = false;
                    kidsHelped++;

                    // CLAIRVOYANCE: Combo system — rapid-fire helping = big score
                    if (comboTimer > 0) {
                        comboCount++;
                    } else {
                        comboCount = 1;
                    }
                    comboTimer = 4; // 4 seconds to keep combo alive

                    const comboMult = Math.min(comboCount, 5);
                    const baseScore = 200;
                    gs.score += baseScore * comboMult;
                    gs.milkCollected += 2;

                    // CLAIRVOYANCE: Satisfaction on hit — shake scales with combo
                    engine.shake(3 + comboMult);
                    engine.audio.sfxCoin();
                    if (comboCount > 1) engine.audio.sfxPowerUp();

                    // CLAIRVOYANCE: Score popup via particles
                    for (let p = 0; p < 5 + comboMult * 2; p++) {
                        engine.particles.emit(this.position.x, this.position.y - 16, {
                            count: 1, color: comboCount > 2 ? '#ffdd44' : '#44ff88',
                            speed: 20 + Math.random() * 30,
                            life: 0.5 + Math.random() * 0.3,
                            size: 2 + Math.random() * 2,
                        });
                    }

                    if (kidsHelped >= totalKids) {
                        setTimeout(() => {
                            engine.switchScene('bonus_victory', 'fade');
                            music.stopSong();
                        }, 2000);
                    }
                }
            };

            kid.draw = function(ctx) {
                this._bobTime += 0.016;
                const bob = Math.sin(this._bobTime * (this._fleeing ? 8 : 3)) * (this._fleeing ? 2 : 1);

                if (!this._helped) {
                    // CLAIRVOYANCE: Scared indicator (exclamation mark when player near)
                    if (this._scared && !this._fleeing) {
                        this._scaredTimer += 0.016;
                        if (this._scaredTimer < 1.5) {
                            ctx.fillStyle = '#ffdd44';
                            ctx.font = 'bold 10px monospace';
                            ctx.textAlign = 'center';
                            ctx.fillText('!', 0, -30 + bob);
                            ctx.textAlign = 'left';
                        }
                    }

                    // Kid body (running animation when fleeing)
                    const legOffset = this._fleeing ? Math.sin(this._bobTime * 12) * 3 : 0;
                    ctx.fillStyle = this._kidColor;
                    ctx.fillRect(-5, -12 + bob, 10, 14);
                    // Legs
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-4, 2 + bob, 3, 4 + legOffset);
                    ctx.fillRect(1, 2 + bob, 3, 4 - legOffset);
                    // Head
                    ctx.fillStyle = '#ffcc88';
                    ctx.fillRect(-4, -20 + bob, 8, 8);
                    // Grumpy/scared eyes
                    ctx.fillStyle = '#000';
                    if (this._fleeing) {
                        // Wide scared eyes
                        ctx.fillRect(-3, -18 + bob, 3, 3);
                        ctx.fillRect(1, -18 + bob, 3, 3);
                    } else {
                        ctx.fillRect(-3, -17 + bob, 2, 2);
                        ctx.fillRect(1, -17 + bob, 2, 2);
                    }
                    // Mouth
                    ctx.fillStyle = this._fleeing ? '#ffaa00' : '#ff0000';
                    ctx.fillRect(-2, -13 + bob, 4, this._fleeing ? 2 : 1);
                    // Soda can
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(6, -14 + bob, 5, 8);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '4px monospace';
                    ctx.fillText('S', 7, -9 + bob);

                    // CLAIRVOYANCE: "Press X" hint when in range
                    const playerNode = scene.findChild('Player');
                    if (playerNode && Math.abs(playerNode.position.x - this.position.x) < 35) {
                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                        ctx.font = 'bold 7px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText('[X]', 0, -34 + bob);
                        ctx.textAlign = 'left';
                    }
                } else {
                    // Happy kid with milk! — jumps for joy
                    const joyBob = Math.abs(Math.sin(this._bobTime * 4)) * 4;
                    ctx.fillStyle = this._kidColor;
                    ctx.fillRect(-5, -12 - joyBob, 10, 14);
                    ctx.fillStyle = '#ffcc88';
                    ctx.fillRect(-4, -20 - joyBob, 8, 8);
                    // Happy sparkle eyes
                    ctx.fillStyle = '#44ff44';
                    ctx.fillRect(-3, -17 - joyBob, 2, 2);
                    ctx.fillRect(1, -17 - joyBob, 2, 2);
                    // Big smile
                    ctx.fillStyle = '#44ff44';
                    ctx.fillRect(-3, -13 - joyBob, 6, 2);
                    ctx.fillRect(-2, -14 - joyBob, 1, 1);
                    ctx.fillRect(3, -14 - joyBob, 1, 1);
                    // Milk bottle held up
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(6, -18 - joyBob, 5, 10);
                    ctx.fillStyle = '#44aa44';
                    ctx.fillRect(6, -19 - joyBob, 5, 3);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '3px monospace';
                    ctx.fillText('RAW', 6, -11 - joyBob);
                    // Joy sparkles
                    const sp = Math.sin(this._bobTime * 6) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255,255,100,${sp * 0.8})`;
                    ctx.fillRect(-10, -28 - joyBob, 2, 2);
                    ctx.fillRect(8, -26 - joyBob, 2, 2);
                    ctx.fillRect(-4, -32 - joyBob, 2, 2);
                    ctx.fillRect(4, -30 - joyBob, 2, 2);
                }

                // Speech bubble
                if (this._showLine && this._lineTimer < 3) {
                    this._lineTimer += 0.016;
                    const alpha = this._lineTimer < 0.3 ? this._lineTimer / 0.3 : this._lineTimer > 2.5 ? 1 - (this._lineTimer - 2.5) / 0.5 : 1;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = 'rgba(0,0,0,0.85)';
                    const tw = ctx.measureText(this._line).width || 80;
                    ctx.fillRect(-tw/2 - 6, -42, tw + 12, 14);
                    ctx.strokeStyle = '#44ff88';
                    ctx.strokeRect(-tw/2 - 6, -42, tw + 12, 14);
                    ctx.fillStyle = '#44ff88';
                    ctx.font = 'bold 8px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(this._line, 0, -33);
                    ctx.textAlign = 'left';
                    ctx.globalAlpha = 1;
                }
            };

            scene.addChild(kid);
        }

        // Place 12 kids along the hallway
        for (let i = 0; i < totalKids; i++) {
            const x = 64 + i * ((mapW - 12) * 16 / totalKids);
            createSodaKid(scene, x, (groundRow - 1) * 16, i);
        }

        // Milk bottles scattered around
        for (let c = 4; c < mapW - 4; c += 5) {
            createMilkPickup(scene, c * 16, (groundRow - 1) * 16 - 4);
        }

        // RFK standing near the end as motivation
        const rfk = new Node('RFK');
        rfk.position = { x: (mapW - 6) * 16, y: (groundRow - 1) * 16 };
        rfk._time = 0;
        rfk.draw = function(ctx) {
            this._time += 0.016;
            const bob = Math.sin(this._time * 2) * 1;
            // Suit body
            ctx.fillStyle = '#1a1a3a';
            ctx.fillRect(-6, -20 + bob, 12, 20);
            // White shirt
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-3, -18 + bob, 6, 4);
            // Tie
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(-1, -18 + bob, 2, 8);
            // Head
            ctx.fillStyle = '#ffcc88';
            ctx.fillRect(-5, -30 + bob, 10, 10);
            // Hair
            ctx.fillStyle = '#554433';
            ctx.fillRect(-5, -32 + bob, 10, 4);
            // Eyes
            ctx.fillStyle = '#224488';
            ctx.fillRect(-3, -27 + bob, 2, 2);
            ctx.fillRect(1, -27 + bob, 2, 2);
            // Smile
            ctx.fillStyle = '#cc6644';
            ctx.fillRect(-2, -23 + bob, 4, 1);
            // Name tag
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(-12, -40 + bob, 24, 8);
            ctx.fillStyle = '#44aaff';
            ctx.font = 'bold 6px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('RFK JR', 0, -34 + bob);
            ctx.textAlign = 'left';
        };
        scene.addChild(rfk);

        // HUD
        const hud = new Node('HUD');
        hud.drawUI = function(ctx) {
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(4, 4, 200, 44);
            ctx.fillRect(engine.width - 204, 4, 200, 44);

            ctx.font = 'bold 16px monospace';
            ctx.textBaseline = 'top';
            ctx.fillStyle = '#ffdd44';
            ctx.fillText('BONUS LEVEL', 10, 8);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px monospace';
            ctx.fillText('SCORE: ' + gs.score, 10, 28);

            ctx.textAlign = 'right';
            ctx.fillStyle = '#44ff88';
            ctx.font = 'bold 16px monospace';
            ctx.fillText('KIDS HELPED: ' + kidsHelped + '/' + totalKids, engine.width - 10, 8);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 14px monospace';
            ctx.fillText('MILK: ' + gs.milkCollected, engine.width - 10, 28);

            // CLAIRVOYANCE: Combo indicator
            if (comboCount > 1 && comboTimer > 0) {
                ctx.textAlign = 'center';
                ctx.fillStyle = comboCount >= 4 ? '#ffdd44' : comboCount >= 2 ? '#ff8844' : '#ffffff';
                ctx.font = 'bold ' + (14 + comboCount * 2) + 'px monospace';
                ctx.fillText('COMBO x' + comboCount + '!', engine.width / 2, 20);
                ctx.font = 'bold 10px monospace';
                ctx.fillStyle = '#ffaa44';
                ctx.fillText('+' + (200 * comboCount) + ' pts', engine.width / 2, 34);
            }
            ctx.restore();
        };
        scene.addChild(hud);

        // Camera
        scene.signals.on('entered', () => {
            kidsHelped = 0;
            engine.camera.follow(player, 0.08);
            engine.camera.setBounds(0, 0, tilemap.pixelWidth, tilemap.pixelHeight);
            engine.camera.setZoom(2, true);
            engine.camera.position = { x: player.position.x, y: player.position.y };
            engine.camera.deadZone = { x: 8, y: 15 };
            engine.camera.lookAheadDistance = 30;
        });

        engine.addScene('bonus_level', scene);
    }

    function buildBonusVictory() {
        const scene = new Scene('BonusVictory');
        scene.backgroundColor = '#0a0a12';
        const bgFill = new Node('BGFill');
        bgFill.drawUI = function(ctx) {
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, engine.width, engine.height);
        };
        scene.addChild(bgFill);

        let timer = 0;
        let phase = 0; // 0=clapping, 1=trophy, 2=press to continue

        const hud = new Node('HUD');
        hud.drawUI = function(ctx) {
            ctx.save();
            timer += 0.016;

            // Background — school auditorium
            ctx.fillStyle = '#1a0a0a';
            ctx.fillRect(0, 0, engine.width, engine.height);
            // Stage
            ctx.fillStyle = '#3a2010';
            ctx.fillRect(0, engine.height * 0.6, engine.width, engine.height * 0.4);
            ctx.fillStyle = '#5a3020';
            ctx.fillRect(0, engine.height * 0.58, engine.width, 8);

            // Crowd of kids clapping
            for (let i = 0; i < 20; i++) {
                const kx = 30 + i * 30;
                const ky = engine.height * 0.48 + Math.sin(i * 1.5 + timer * 8) * 3;
                const colors = ['#ff6666','#6688ff','#66ff66','#ffaa44','#ff66ff','#66ffff'];
                ctx.fillStyle = colors[i % colors.length];
                ctx.fillRect(kx - 3, ky, 6, 8);
                ctx.fillStyle = '#ffcc88';
                ctx.fillRect(kx - 2, ky - 5, 4, 5);
                // Clapping hands
                const clap = Math.sin(timer * 10 + i) > 0;
                if (clap) {
                    ctx.fillStyle = '#ffcc88';
                    ctx.fillRect(kx - 5, ky + 2, 2, 2);
                    ctx.fillRect(kx + 3, ky + 2, 2, 2);
                }
            }

            // "CLAP CLAP CLAP" text
            if (phase === 0 && timer < 4) {
                const clapAlpha = Math.sin(timer * 6) * 0.5 + 0.5;
                ctx.globalAlpha = clapAlpha;
                ctx.fillStyle = '#ffdd44';
                ctx.font = 'bold 18px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('*CLAP* *CLAP* *CLAP*', engine.width / 2, engine.height * 0.3);
                ctx.globalAlpha = 1;
            }

            if (timer > 3) phase = 1;

            // RFK gives trophy
            if (phase >= 1) {
                // RFK
                const rx = engine.width / 2 - 40;
                const ry = engine.height * 0.65;
                ctx.fillStyle = '#1a1a3a';
                ctx.fillRect(rx - 6, ry, 12, 20);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(rx - 3, ry + 2, 6, 4);
                ctx.fillStyle = '#cc2222';
                ctx.fillRect(rx - 1, ry + 2, 2, 8);
                ctx.fillStyle = '#ffcc88';
                ctx.fillRect(rx - 5, ry - 10, 10, 10);
                ctx.fillStyle = '#554433';
                ctx.fillRect(rx - 5, ry - 12, 10, 4);

                // Matt
                const mx = engine.width / 2 + 40;
                const my = engine.height * 0.65;
                ctx.fillStyle = '#4444ff';
                ctx.fillRect(mx - 6, my, 12, 20);
                ctx.fillStyle = '#ffcc88';
                ctx.fillRect(mx - 5, my - 10, 10, 10);
                ctx.fillStyle = '#884422';
                ctx.fillRect(mx - 5, my - 14, 10, 6);

                // Trophy between them
                const trophy_y = ry - 20 + Math.sin(timer * 2) * 3;
                ctx.fillStyle = '#ffdd44';
                ctx.fillRect(engine.width / 2 - 6, trophy_y, 12, 8);
                ctx.fillRect(engine.width / 2 - 3, trophy_y + 8, 6, 6);
                ctx.fillRect(engine.width / 2 - 8, trophy_y + 14, 16, 3);
                // Trophy shine
                ctx.fillStyle = 'rgba(255,255,200,' + (Math.sin(timer * 3) * 0.3 + 0.5) + ')';
                ctx.fillRect(engine.width / 2 - 2, trophy_y + 2, 3, 3);

                // Speech
                ctx.fillStyle = '#44aaff';
                ctx.font = 'bold 12px monospace';
                ctx.textAlign = 'center';
                if (timer < 6) {
                    ctx.fillText('"Thank you, Matt."', engine.width / 2, ry - 30);
                } else if (timer < 9) {
                    ctx.fillText('"You made these kids healthier."', engine.width / 2, ry - 30);
                } else {
                    ctx.fillStyle = '#ffdd44';
                    ctx.font = 'bold 14px monospace';
                    ctx.fillText('"THE RAW MILK HERO!"', engine.width / 2, ry - 30);
                }
            }

            if (timer > 10) phase = 2;

            if (phase >= 2) {
                ctx.fillStyle = '#ffdd44';
                ctx.font = 'bold 20px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('MISSION COMPLETE', engine.width / 2, 40);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px monospace';
                ctx.fillText('SCORE: ' + gs.score, engine.width / 2, 70);

                const blink = Math.floor(timer * 2) % 2;
                if (blink) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '12px monospace';
                    ctx.fillText('PRESS A TO CONTINUE', engine.width / 2, engine.height - 30);
                }
            }

            ctx.textAlign = 'left';
            ctx.restore();
        };
        scene.addChild(hud);

        scene.update = function(dt) {
            if (phase >= 2 && (engine.input.isKeyDown('Space') || engine.input.isKeyDown('gamepad_a') || engine.input.isKeyDown('Enter') || engine.input.isKeyDown('gamepad_start'))) {
                gs.state = 'victory';
                engine.switchScene('victory', 'fade');
            }
        };

        scene.signals.on('entered', () => {
            engine.camera.position = { x: engine.width / 2, y: engine.height / 2 };
            engine.camera.setZoom(1, true);
            engine.camera.target = null;
            engine.camera.bounds = null;
            timer = 0;
            phase = 0;
            music.playSong(MusicEngine.SONGS.victory);
        });

        engine.addScene('bonus_victory', scene);
    }

    // =============================================
    //  BOOT
    // =============================================
    generateSprites();
    buildIntro();
    buildTitle();
    buildLevel(1);
    buildLevel(2);
    buildGameOver();
    buildVictory();
    buildRFKCutscene();
    buildBonusLevel();
    buildBonusVictory();

    gs.state = 'title';

    // Audio unlock on first click
    document.addEventListener('click', () => {
        music._ensureContext();
        if (music._ctx?.state === 'suspended') music._ctx.resume();
        engine.audio.resume();
        music.playSong(MusicEngine.SONGS.titleScreen);
    }, { once: true });

    // Override gamepad to use postMessage state (iframe can't access gamepad API)
    const btnMap = {gamepad_a:0, gamepad_b:1, gamepad_x:2, gamepad_y:3, gamepad_lb:4, gamepad_rb:5, gamepad_lt:6, gamepad_rt:7, gamepad_select:8, gamepad_start:9, gamepad_l3:10, gamepad_r3:11, gamepad_up:12, gamepad_down:13, gamepad_left:14, gamepad_right:15};
    // Clear justPressed/justReleased once per frame (not per read)
    const _origEndFrame = engine.input._lateUpdate.bind(engine.input);
    engine.input._lateUpdate = function() {
        _origEndFrame();
        const gs = window._gamepadState;
        gs.justPressed.fill(false);
        gs.justReleased.fill(false);
    };

    engine.input._gamepadButton = function(key, type) {
        const idx = btnMap[key];
        if (idx === undefined) return false;
        const gs = window._gamepadState;
        if (type === 'down') return gs.justPressed[idx];
        if (type === 'up') return gs.justReleased[idx];
        return gs.buttons[idx];
    };

    // Override isKeyDown/isKey/isKeyUp to check gamepad buttons too
    // (the originals only check _keysDown which is keyboard-only)
    const _origIsKeyDown = engine.input.isKeyDown.bind(engine.input);
    const _origIsKey = engine.input.isKey.bind(engine.input);
    const _origIsKeyUp = engine.input.isKeyUp.bind(engine.input);

    engine.input.isKeyDown = function(code) {
        if (code.startsWith('gamepad_')) return this._gamepadButton(code, 'down');
        return _origIsKeyDown(code);
    };
    engine.input.isKey = function(code) {
        if (code.startsWith('gamepad_')) return this._gamepadButton(code, 'held');
        return _origIsKey(code);
    };
    engine.input.isKeyUp = function(code) {
        if (code.startsWith('gamepad_')) return this._gamepadButton(code, 'up');
        return _origIsKeyUp(code);
    };
    engine.input.getAxis = function(stick) {
        const gs = window._gamepadState;
        const x = stick === 'left' ? (gs.axes[0]||0) : (gs.axes[2]||0);
        const y = stick === 'left' ? (gs.axes[1]||0) : (gs.axes[3]||0);
        return { x: Math.abs(x) < 0.15 ? 0 : x, y: Math.abs(y) < 0.15 ? 0 : y };
    };

    // Gamepad debug overlay (remove once working)
    const _origRender = engine._render.bind(engine);
    engine._render = function() {
        _origRender();
        const ctx = engine.ctx;
        const gs = window._gamepadState;
        ctx.save();
        ctx.font = '11px monospace';
        ctx.fillStyle = '#0f0';
        ctx.fillText('GP msgs: ' + (window._gpMsgCount || 0), 4, engine.height - 20);
        const pressed = [];
        const names = ['A','B','X','Y','LB','RB','LT','RT','Sel','Sta','L3','R3','U','D','L','R'];
        for (let i = 0; i < 16; i++) if (gs.buttons[i]) pressed.push(names[i]);
        ctx.fillText('Held: ' + (pressed.length ? pressed.join('+') : 'none'), 4, engine.height - 10);
        // Show justPressed too
        const jp = [];
        for (let i = 0; i < 16; i++) if (gs.justPressed[i]) jp.push(names[i]);
        if (jp.length) ctx.fillText('PRESSED: ' + jp.join('+'), 4, engine.height - 30);
        ctx.restore();
    };

    // Send FPS/scene data to parent IDE via postMessage
    setInterval(() => {
        try {
            const data = {
                type: 'gameStats',
                fps: engine.time ? Math.round(1 / (engine.time.dt || 0.016)) : 0,
                scene: engine.scene?.name || 'none',
                entities: engine.scene?.children?.length || 0
            };
            if (window.parent !== window) window.parent.postMessage(data, '*');
        } catch(e) {}
    }, 500);

    // Boot
    engine.start('intro');

    document.addEventListener('click', () => {
        music._ensureContext();
        if (music._ctx?.state === 'suspended') music._ctx.resume();
        engine.audio.resume();
    }, { once: true });

    console.log('RAW MILK loaded! Press Space to start.');

    // ==================== MOBILE TOUCH SETUP ====================
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        // Orientation lock attempt
        try { if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(() => {}); } catch(e) {}

        // Fill viewport on resize/rotate
        function mmResize() {
            const c = document.getElementById('game-canvas');
            if (c) { c.style.width = window.innerWidth + 'px'; c.style.height = window.innerHeight + 'px'; }
        }
        window.addEventListener('resize', mmResize);
        window.addEventListener('orientationchange', () => setTimeout(mmResize, 100));
        mmResize();

        // Tap canvas = resume audio + confirm on title/gameover screens
        document.getElementById('game-canvas').addEventListener('touchstart', () => {
            music._ensureContext?.();
            engine.audio.resume?.();
            // Inject Space as just-pressed so title/gameover scenes pick it up
            engine.input._keysDown['Space'] = true;
            engine.input._keys['Space'] = true;
            setTimeout(() => { engine.input._keys['Space'] = false; }, 80);
        }, { passive: true });

        // Wire a touch button to the engine input system
        function mmWireBtn(id, heldCode, tapCode) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                el.classList.add('active');
                if (heldCode) engine.input._keys[heldCode] = true;
                if (tapCode) { engine.input._keysDown[tapCode] = true; engine.input._keys[tapCode] = true; }
                engine.audio.resume?.();
            }, { passive: false });
            el.addEventListener('touchend', (e) => {
                e.preventDefault();
                el.classList.remove('active');
                if (heldCode) engine.input._keys[heldCode] = false;
                if (tapCode) engine.input._keys[tapCode] = false;
            }, { passive: false });
            el.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                el.classList.remove('active');
                if (heldCode) engine.input._keys[heldCode] = false;
                if (tapCode) engine.input._keys[tapCode] = false;
            }, { passive: false });
        }

        mmWireBtn('mm-left',   'ArrowLeft',  null);
        mmWireBtn('mm-right',  'ArrowRight', null);
        mmWireBtn('mm-jump',   null,         'Space');       // isKeyDown('Space')
        mmWireBtn('mm-atk',    'KeyX',       null);          // isKey('KeyX') — rising edge in game
        mmWireBtn('mm-shield', 'KeyZ',       null);          // isKey('KeyZ') — held shield
        mmWireBtn('mm-rant',   null,         'KeyR');        // isKeyDown('KeyR')
    }
    </script>
</body>
</html>
