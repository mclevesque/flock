    <script>
    window._gamepadState = { buttons: new Array(16).fill(false), prevButtons: new Array(16).fill(false), justPressed: new Array(16).fill(false), justReleased: new Array(16).fill(false), axes: [0,0,0,0] };
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'gamepad') {
            const gs = window._gamepadState, nb = e.data.buttons;
            for (let i = 0; i < 16; i++) { if (nb[i] && !gs.buttons[i]) gs.justPressed[i] = true; if (!nb[i] && gs.buttons[i]) gs.justReleased[i] = true; }
            gs.buttons = nb; gs.axes = e.data.axes;
        }
    });
    window._gamepadPoll = function() { try { const gps = navigator.getGamepads(); for (let i = 0; i < gps.length; i++) { const gp = gps[i]; if (!gp) continue; const gs = window._gamepadState; gs.prevButtons = [...gs.buttons]; gs.buttons = Array.from(gp.buttons).map(b => b.pressed); gs.axes = Array.from(gp.axes); return; } } catch(e) {} };

    // =============================================
    //  PIXEL ART

    function drawPerson(ctx, ox, oy, f, opts) {
        const bob = [0, -1, 0, -1][f % 4];
        const legOff = [2, -1, -2, 1][f % 4];
        const armOff = [0, 1, 0, -1][f % 4];
        if (opts.helmet) {
            ctx.fillStyle = '#6699bb'; ctx.fillRect(ox + 2, oy + bob, 12, 9);
            ctx.fillStyle = '#99ccee'; ctx.fillRect(ox + 3, oy + 1 + bob, 10, 7);
        }
        ctx.fillStyle = opts.skin; ctx.fillRect(ox + 4, oy + 2 + bob, 8, 6);
        ctx.fillStyle = opts.hair; ctx.fillRect(ox + 4, oy + 1 + bob, 8, 3);
        ctx.fillStyle = opts.eyes || '#000';
        ctx.fillRect(ox + 5, oy + 4 + bob, 2, 1); ctx.fillRect(ox + 9, oy + 4 + bob, 2, 1);
        if (opts.beard) { ctx.fillStyle = opts.beard; ctx.fillRect(ox + 4, oy + 6 + bob, 8, 3); ctx.fillRect(ox + 5, oy + 8 + bob, 6, 1); }
        if (opts.mouth) { ctx.fillStyle = opts.mouth; ctx.fillRect(ox + 6, oy + 6 + bob, 4, 1); }
        if (opts.glasses) { ctx.fillStyle = '#4488cc'; ctx.fillRect(ox + 4, oy + 3 + bob, 4, 2); ctx.fillRect(ox + 8, oy + 3 + bob, 4, 2); ctx.fillStyle = '#333'; ctx.fillRect(ox + 8, oy + 4 + bob, 1, 1); }
        if (opts.bowtie) { ctx.fillStyle = opts.bowtie; ctx.fillRect(ox + 5, oy + 8 + bob, 2, 2); ctx.fillRect(ox + 9, oy + 8 + bob, 2, 2); ctx.fillRect(ox + 7, oy + 9 + bob, 2, 1); }
        if (opts.mustache) { ctx.fillStyle = opts.mustache; ctx.fillRect(ox + 5, oy + 5 + bob, 6, 2); }
        ctx.fillStyle = opts.shirt; ctx.fillRect(ox + 3, oy + 9 + bob, 10, 7);
        if (opts.stripe) { ctx.fillStyle = opts.stripe; ctx.fillRect(ox + 6, oy + 9 + bob, 4, 7); }
        ctx.fillStyle = opts.shirt;
        ctx.fillRect(ox + 0, oy + 10 + bob + armOff, 4, 5); ctx.fillRect(ox + 12, oy + 10 + bob - armOff, 4, 5);
        ctx.fillStyle = opts.helmet ? '#777788' : opts.skin;
        ctx.fillRect(ox + 0, oy + 14 + bob + armOff, 4, 2); ctx.fillRect(ox + 12, oy + 14 + bob - armOff, 4, 2);
        ctx.fillStyle = opts.pants;
        ctx.fillRect(ox + 4, oy + 16 + bob + legOff, 3, 5); ctx.fillRect(ox + 9, oy + 16 + bob - legOff, 3, 5);
        ctx.fillStyle = opts.boots;
        ctx.fillRect(ox + 3, oy + 20 + bob + legOff, 5, 3); ctx.fillRect(ox + 8, oy + 20 + bob - legOff, 5, 3);
    }

    function generateSprites() {

        // NEIL DEGRASSE TYSON (vest, mustache, pointing)

        // DR. FAUCI (small, glasses, white coat, syringe)
        const fauciC = document.createElement('canvas'); fauciC.width = 64; fauciC.height = 24;
        const faCtx = fauciC.getContext('2d'); faCtx.imageSmoothingEnabled = false;
        for (let f = 0; f < 4; f++) {

    let usedQuotes = {};
    function getQuote(cat) {
        if (!mattQuotes[cat]) return "...";
        if (!usedQuotes[cat]) usedQuotes[cat] = [];
        const pool = mattQuotes[cat].filter((_, i) => !usedQuotes[cat].includes(i));
        if (pool.length === 0) { usedQuotes[cat] = []; return getQuote(cat); }
        const idx = mattQuotes[cat].indexOf(pool[Math.floor(Math.random() * pool.length)]);
        usedQuotes[cat].push(idx);
        return mattQuotes[cat][idx];
    }

    // =============================================
    //  DIALOG & HELPERS
    // =============================================
    function queueDialog(speaker, text, duration) {
        duration = duration || Math.max(2.5, text.length * 0.055);
        gs.dialogQueue.push({ speaker, text, duration });
        if (!gs.dialogActive) showNextDialog();
    }
    function showNextDialog() {
        if (gs.dialogQueue.length === 0) { gs.dialogActive = false; gs.currentDialog = null; return; }
        gs.dialogActive = true;
        gs.currentDialog = gs.dialogQueue.shift();
        gs.dialogTimer = gs.currentDialog.duration;
    }
    function drawDialog(ctx, d) {
        const bw = 500, bh = 55, bx = 70, by = 285;
        ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(bx, by, bw, bh);
        ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh);
        ctx.font = 'bold 12px monospace'; ctx.textAlign = 'left';
        const colors = { MARK: '#88ccff', BRIAN: '#88ff88', MATT: '#ff8833', 'BILL NYE': '#4488ff', 'FAUCI': '#ff4444' };
        ctx.fillStyle = colors[d.speaker] || '#fff';
        ctx.fillText(d.speaker, bx + 10, by + 16);
        ctx.font = '11px monospace'; ctx.fillStyle = '#fff';
        const words = d.text.split(' '); let line = '', y = by + 33;
        for (const w of words) { const test = line + w + ' '; if (ctx.measureText(test).width > bw-20) { ctx.fillText(line, bx+10, y); line = w+' '; y += 14; } else line = test; }
        ctx.fillText(line, bx + 10, y);
        // Skip hint
        ctx.font = '8px monospace'; ctx.fillStyle = '#666'; ctx.textAlign = 'right';
        ctx.fillText('click/enter to skip', bx + bw - 8, by + 12);
    }
    function tickDialog(dt) { if (gs.dialogActive && gs.currentDialog) { gs.dialogTimer -= dt; if (gs.dialogTimer <= 0) showNextDialog(); } }
    // Skip dialog on click or Enter
    function skipDialog() {
        if (gs.dialogActive && gs.currentDialog) {
            gs.dialogTimer = 0;
            showNextDialog();
            try { engine.audio.synth('sine', { frequency: 600, frequencyEnd: 800, duration: 0.04, volume: 0.08 }); } catch(e) {}
        }
    }
    document.addEventListener('click', skipDialog);
    document.addEventListener('keydown', function(e) {
        if ((e.code === 'Enter' || e.code === 'Space') && gs.dialogActive && gs.state !== 'title') {
            e.preventDefault();
            skipDialog();
        }
    });
    function makeStars(n, w, h) { const s = []; for (let i=0;i<n;i++) s.push({x:Math.random()*w, y:Math.random()*h, s:Math.random()*1.5+0.3, t:Math.random()*Math.PI*2, sp:Math.random()*0.5+0.2}); return s; }
    function drawStars(ctx, stars, dt, alpha) { for (const s of stars) { s.t += s.sp*(dt||0); const a = (alpha||1)*(0.3+Math.sin(s.t)*0.35); ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fillRect(s.x, s.y, s.s, s.s); } }

    // =============================================
    //  LAB SCENE — Underground Secret Lab
    // =============================================
    class LabScene extends Scene {
        constructor() { super('Lab'); }

        _enter() {
            super._enter();
            this._t = 0;
            this._phase = 'descent'; // descent → explore → standoff → combat → victory → escape
            this._phaseTimer = 0;
            this._dq = false; // dialog queued for this phase

            // Player (Matt) position inside lab
            this._px = 320; this._py = 248;
            this._vx = 0; this._vy = 0;
            this._facingRight = true;
            this._attackTimer = 0; // cooldown
            this._attackAnim = 0; // visual flash

            // Scientists
            this._scientists = [
                { x:120, y:248, hp:3, maxHp:3, head:false, alive:true, vx:0, alert:false, hitFlash:0 },
                { x:200, y:248, hp:3, maxHp:3, head:false, alive:true, vx:0, alert:false, hitFlash:0 },
                { x:400, y:248, hp:3, maxHp:3, head:false, alive:true, vx:0, alert:false, hitFlash:0 },
                { x:480, y:248, hp:3, maxHp:3, head:false, alive:true, vx:0, alert:false, hitFlash:0 },
                { x:320, y:248, hp:5, maxHp:5, head:true,  alive:true, vx:0, alert:false, hitFlash:0 }, // HEAD SCIENTIST
            ];
            this._headSci = this._scientists[4];

            // Bullets/attacks
            this._projectiles = []; // { x, y, vx, fromPlayer, r }

            // Frog (decorative, beloved)
            this._frogAnim = 0;

            // Descent text overlay
            this._descentAlpha = 1.0;

            gs.dialogQueue = []; gs.dialogActive = false; gs.currentDialog = null;
            this._queueDescentDialog();
        }

        _queueDescentDialog() {
            queueDialog('MATT', "*descends ladder*");
            queueDialog('MATT', "Okay. I'm in. It's... real.");
            queueDialog('MATT', "Fluorescent lights. Grey floor. Smells like government.");
            queueDialog('MARK', "What do you see?");
            queueDialog('MATT', "Beakers. Chemicals. A whiteboard that says 'DO NOT ENTER.'");
            queueDialog('MATT', "A frog wearing a tiny lab coat.");
            queueDialog('BRIAN', "Is the frog okay?");
            queueDialog('MATT', "The frog looks GREAT, Brian.");
            queueDialog('MATT', "The whiteboard — 'PROJECT: FABULOUS FROG PHASE 3 — ON SCHEDULE'");
            queueDialog('MATT', "Phase THREE. There were TWO before this.");
            queueDialog('MARK', "Matt... the scientists.");
            queueDialog('MATT', "Four of them. In lab coats. One has a name tag: 'Dr. Henderson — HEAD SCIENTIST.'");
            queueDialog('MATT', "He just turned around.");
            queueDialog('MATT', "He sees me.");
            queueDialog('MATT', "...");
        }

        _queueStandoffDialog() {
            queueDialog('DR. HENDERSON', "Unauthorized personnel.");
            queueDialog('DR. HENDERSON', "You've seen Project Fabulous Frog.");
            queueDialog('MATT', "The frog is FINE, I'm not—");
            queueDialog('DR. HENDERSON', "Doesn't matter what you think of the frog.");
            queueDialog('DR. HENDERSON', "What matters is what you KNOW.");
            queueDialog('MATT', "I know Phase 3 is on schedule—");
            queueDialog('DR. HENDERSON', "GET THEM.");
            queueDialog('MATT', "OH NO.");
        }

        _queueVictoryDialog() {
            queueDialog('MATT', "We... we did it.");
            queueDialog('DR. HENDERSON', "*breathing heavily* You haven't seen the last of Phase 3.");
            queueDialog('MATT', "The frog is SAFE!");
            queueDialog('BRIAN', "The frog was never in danger, Matt.");
            queueDialog('MATT', "THE FROG IS SAFE.");
            queueDialog('MARK', "We need to get out of here before backup arrives.");
            queueDialog('MATT', "*looks at frog* You deserve to be free, little guy.");
            queueDialog('MATT', "...*pockets the frog*");
            queueDialog('BRIAN', "DID YOU JUST—");
            queueDialog('MATT', "He came with me. Willingly. Let's go.");
        }

        update(dt) {
            this._t += dt;
            this._phaseTimer += dt;
            tickDialog(dt);
            this._frogAnim += dt;

            if (this._attackTimer > 0) this._attackTimer -= dt;
            if (this._attackAnim > 0) this._attackAnim -= dt;

            // Advance phase based on dialog completion
            if (this._phase === 'descent' && !gs.dialogActive && gs.dialogQueue.length === 0 && this._phaseTimer > 2) {
                this._phase = 'explore';
                this._phaseTimer = 0;
            }

            if (this._phase === 'explore' && !this._dq) {
                this._dq = true;
                // Give player a moment to explore before standoff
            }

            // Auto-trigger standoff after some exploration time
            if (this._phase === 'explore' && this._phaseTimer > 4 && !gs.dialogActive) {
                this._phase = 'standoff';
                this._phaseTimer = 0;
                this._dq = false;
                this._queueStandoffDialog();
            }

            if (this._phase === 'standoff' && !gs.dialogActive && gs.dialogQueue.length === 0 && this._phaseTimer > 1) {
                this._phase = 'combat';
                this._phaseTimer = 0;
                this._scientists.forEach(s => s.alert = true);
            }

            if (this._phase === 'combat') {
                this._updateCombat(dt);
                const allDead = this._scientists.every(s => !s.alive);
                if (allDead && !this._dq) {
                    this._dq = true;
                    this._phase = 'victory';
                    this._phaseTimer = 0;
                    this._queueVictoryDialog();
                }
            }

            if (this._phase === 'victory' && !gs.dialogActive && gs.dialogQueue.length === 0 && this._phaseTimer > 2) {
                gs.mattSecretJoy = Math.min(100, gs.mattSecretJoy + 20);
                engine.switchScene('moon', 'fade');
            }

            // Player movement (all phases except descent)
            if (this._phase !== 'descent') this._updatePlayer(dt);

            // Projectile movement
            for (const p of this._projectiles) {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
            }
            this._projectiles = this._projectiles.filter(p => p.life > 0 && p.x > 0 && p.x < 640 && p.y > 0 && p.y < 360);
        }

        _updatePlayer(dt) {
            const spd = 120;
            let mx = 0;
            const left  = engine.input.isKey('ArrowLeft')  || engine.input.isKey('KeyA') || engine.input._gamepadButton('gamepad_left','held');
            const right = engine.input.isKey('ArrowRight') || engine.input.isKey('KeyD') || engine.input._gamepadButton('gamepad_right','held');
            const attack = engine.input.isKeyDown('KeyZ') || engine.input.isKeyDown('KeyX') ||
                           engine.input.isKeyDown('Space') || engine.input._gamepadButton('gamepad_a','held') || engine.input._gamepadButton('gamepad_x','held');

            if (left)  { mx = -1; this._facingRight = false; }
            if (right) { mx =  1; this._facingRight = true; }
            this._px = Math.max(20, Math.min(620, this._px + mx * spd * dt));

            // Attack
            if (attack && this._attackTimer <= 0 && this._phase === 'combat') {
                this._attackTimer = 0.35;
                this._attackAnim = 0.15;
                // Spawn attack projectile
                this._projectiles.push({ x: this._px + (this._facingRight ? 18 : -18), y: this._py, vx: this._facingRight ? 280 : -280, vy: 0, life: 0.5, fromPlayer: true, r: 5 });
            }
        }

        _updateCombat(dt) {
            // Scientists AI
            for (const sci of this._scientists) {
                if (!sci.alive) continue;
                if (sci.hitFlash > 0) sci.hitFlash -= dt;

                // Move toward player
                const dx = this._px - sci.x;
                sci.vx = Math.sign(dx) * 40;
                sci.x = Math.max(20, Math.min(620, sci.x + sci.vx * dt));

                // Shoot at player periodically
                sci._shootTimer = (sci._shootTimer || 0) - dt;
                if (sci._shootTimer <= 0) {
                    sci._shootTimer = sci.head ? 1.8 : 2.5 + Math.random() * 1.5;
                    const angle = Math.atan2(this._py - sci.y, this._px - sci.x);
                    this._projectiles.push({ x: sci.x, y: sci.y, vx: Math.cos(angle) * 130, vy: Math.sin(angle) * 130, life: 1.2, fromPlayer: false, r: 4 });
                }
            }

            // Collide player projectiles with scientists
            for (const proj of this._projectiles) {
                if (!proj.fromPlayer) continue;
                for (const sci of this._scientists) {
                    if (!sci.alive) continue;
                    const dx = proj.x - sci.x, dy = proj.y - sci.y;
                    if (Math.sqrt(dx*dx+dy*dy) < 14) {
                        sci.hp--;
                        sci.hitFlash = 0.2;
                        proj.life = 0; // consume
                        if (sci.hp <= 0) sci.alive = false;
                        break;
                    }
                }
            }

            // Collide enemy projectiles with player
            for (const proj of this._projectiles) {
                if (proj.fromPlayer) continue;
                const dx = proj.x - this._px, dy = proj.y - this._py;
                if (Math.sqrt(dx*dx+dy*dy) < 12) {
                    proj.life = 0;
                    engine.shake(4, 0.8);
                    // Mild punishment — just visual shake, Matt is brave
                }
            }
        }

        drawUI(ctx) {
            // Background — underground lab
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, 640, 360);

            // Floor / ceiling
            ctx.fillStyle = '#2a2a3e'; ctx.fillRect(0, 280, 640, 80); // floor
            ctx.fillStyle = '#111122'; ctx.fillRect(0, 0, 640, 60);   // ceiling

            // Fluorescent lights on ceiling
            for (let i = 0; i < 4; i++) {
                const lx = 80 + i * 160;
                const flicker = Math.sin(this._t * 30 + i) > 0.98; // rare flicker
                ctx.fillStyle = flicker ? '#333355' : '#ffffcc';
                ctx.fillRect(lx - 20, 10, 40, 6);
                if (!flicker) {
                    ctx.fillStyle = 'rgba(255,255,200,0.08)';
                    ctx.fillRect(lx - 40, 10, 80, 270);
                }
            }

            // Lab tables
            const tables = [60, 200, 380, 520];
            for (const tx of tables) {
                ctx.fillStyle = '#888'; ctx.fillRect(tx-30, 230, 60, 8);
                ctx.fillStyle = '#666'; ctx.fillRect(tx-28, 238, 4, 40); ctx.fillRect(tx+24, 238, 4, 40);
                // Beakers on table
                ctx.fillStyle = '#44aaff88'; ctx.fillRect(tx-18, 220, 8, 12);
                ctx.fillStyle = '#ff449988'; ctx.fillRect(tx+10, 220, 8, 12);
                // Bubbles in beakers
                if (Math.floor(this._t * 3 + tx) % 3 < 2) {
                    ctx.fillStyle = '#fff'; ctx.fillRect(tx - 14, 218 - Math.floor(this._t * 4 + tx) % 8, 2, 2);
                    ctx.fillRect(tx + 14, 218 - Math.floor(this._t * 3 + tx) % 6, 2, 2);
                }
            }

            // Frog tank (center back — beloved)
            const ftx = 320, fty = 195;
            ctx.fillStyle = '#225533'; ctx.fillRect(ftx - 25, fty - 25, 50, 30);
            ctx.fillStyle = 'rgba(100,200,100,0.2)'; ctx.fillRect(ftx - 22, fty - 22, 44, 24);
            // Frog inside
            const frogBob = Math.sin(this._frogAnim * 2) * 2;
            ctx.fillStyle = '#44dd44'; ctx.fillRect(ftx - 7, fty - 12 + frogBob, 14, 10); // body
            ctx.fillStyle = '#33bb33'; ctx.fillRect(ftx - 9, fty - 6 + frogBob, 4, 6); ctx.fillRect(ftx + 5, fty - 6 + frogBob, 4, 6); // legs
            ctx.fillStyle = '#ff5555'; // tiny rainbow flag
            ctx.fillRect(ftx + 5, fty - 20 + frogBob, 1, 10);
            for (let i = 0; i < 6; i++) {
                const fc = ['#ff0000','#ff8800','#ffff00','#00cc00','#0066ff','#9900ff'][i];
                ctx.fillStyle = fc; ctx.fillRect(ftx + 6, fty - 20 + frogBob + i * 1.6, 8, 1.4);
            }
            // Tank label
            ctx.font = '7px monospace'; ctx.fillStyle = '#88ff88'; ctx.textAlign = 'center';
            ctx.fillText('PROJECT FF-3', ftx, fty + 12);

            // Whiteboard
            ctx.fillStyle = '#eee'; ctx.fillRect(500, 80, 110, 70);
            ctx.fillStyle = '#ddd'; ctx.fillRect(500, 80, 110, 10);
            ctx.font = '6px monospace'; ctx.fillStyle = '#222'; ctx.textAlign = 'left';
            ctx.fillText('PROJECT:', 506, 100);
            ctx.fillStyle = '#8800cc';
            ctx.fillText('FABULOUS FROG', 506, 110);
            ctx.fillStyle = '#ff00aa';
            ctx.fillText('PHASE 3', 506, 120);
            ctx.fillStyle = '#00aa44';
            ctx.fillText('✓ ON SCHEDULE', 506, 130);
            ctx.fillStyle = '#333';
            ctx.fillText('DO NOT ENTER', 506, 143);

            // "EXIT: LADDER" sign
            ctx.fillStyle = '#44ff44'; ctx.fillRect(15, 70, 50, 14);
            ctx.font = '6px monospace'; ctx.fillStyle = '#000'; ctx.textAlign = 'center';
            ctx.fillText('EXIT: LADDER', 40, 80);

            // Draw scientists
            for (let i = 0; i < this._scientists.length; i++) {
                const sci = this._scientists[i];
                if (!sci.alive) continue;
                const isHead = i === 4;
                const sy = sci.y; // y=248, feet at sy, head at sy-30

                const bodyColor = sci.hitFlash > 0 ? '#fff' : (isHead ? '#ffaa44' : '#6688aa');
                ctx.fillStyle = bodyColor;
                ctx.fillRect(sci.x - 6, sy - 18, 12, 16);
                ctx.fillStyle = sci.hitFlash > 0 ? '#fff' : '#ffcc99';
                ctx.fillRect(sci.x - 5, sy - 30, 10, 12);
                // Lab coat
                ctx.fillStyle = sci.hitFlash > 0 ? '#fff' : '#e8e8ff';
                ctx.fillRect(sci.x - 7, sy - 17, 14, 16);
                // Head scientist hat
                if (isHead) {
                    ctx.fillStyle = sci.hitFlash > 0 ? '#fff' : '#222244';
                    ctx.fillRect(sci.x - 6, sy - 36, 12, 6);
                }
                // HP bar
                if (sci.hp < sci.maxHp) {
                    ctx.fillStyle = '#550000'; ctx.fillRect(sci.x - 12, sy - 44, 24, 4);
                    ctx.fillStyle = '#ff4444'; ctx.fillRect(sci.x - 12, sy - 44, 24 * (sci.hp / sci.maxHp), 4);
                }
            }

            // Draw player (Matt + friends)
            const py = this._py;
            // Attack flash
            if (this._attackAnim > 0) {
                ctx.fillStyle = 'rgba(255,255,100,0.3)';
                const ax = this._facingRight ? this._px + 15 : this._px - 35;
                ctx.fillRect(ax, py - 25, 30, 20);
            }
            try {
                const frame = Math.floor(this._t * 6) % 4;
                ctx.drawImage(engine.assets.images['matt'], frame*16, 0, 16, 24, this._px - 8, py - 24, 16, 24);
                ctx.drawImage(engine.assets.images['mark'], frame*16, 0, 16, 24, this._px - 30, py - 24, 16, 24);
                ctx.drawImage(engine.assets.images['brian'], frame*16, 0, 16, 24, this._px + 14, py - 24, 16, 24);
            } catch(e) {
                ctx.fillStyle = '#ffcc99'; ctx.fillRect(this._px - 8, py - 24, 10, 20);
            }

            // Draw projectiles
            for (const proj of this._projectiles) {
                ctx.fillStyle = proj.fromPlayer ? '#ffff44' : '#ff4444';
                ctx.beginPath(); ctx.arc(proj.x, proj.y, proj.r, 0, Math.PI * 2); ctx.fill();
            }

            // Phase overlays
            if (this._phase === 'descent') {
                const a = Math.max(0, 1 - this._phaseTimer * 0.5);
                if (a > 0) {
                    ctx.fillStyle = `rgba(0,0,0,${a * 0.7})`;
                    ctx.fillRect(0, 0, 640, 360);
                }
            }

            // Combat phase — attack hint (first few seconds)
            if (this._phase === 'combat' && this._phaseTimer < 5) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(180, 320, 280, 22);
                ctx.font = '9px monospace'; ctx.fillStyle = '#ffff44'; ctx.textAlign = 'center';
                ctx.fillText('[Z/X/SPACE/A] ATTACK — Move with Arrow Keys', 320, 335);
            }

            // Victory overlay
            if (this._phase === 'victory' && this._phaseTimer > 0.5) {
                ctx.fillStyle = 'rgba(0,80,0,0.3)';
                ctx.fillRect(0, 0, 640, 360);
                ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#88ff88'; ctx.textAlign = 'center';
                ctx.fillText('LAB CLEARED', 320, 160);
            }

            // Dialog
            if (gs.dialogActive && gs.currentDialog) drawDialog(ctx, gs.currentDialog);
        }
    }

    // =============================================
    //  ENDING
    // =============================================
    class EndingScene extends Scene {
        constructor() { super('Ending'); }
        _enter() { super._enter(); this._t=0; this._stars=makeStars(200,640,360); gs.dialogQueue=[]; gs.dialogActive=false; gs.currentDialog=null; this._dq=false; try { music.playSong(endingSong); } catch(e){} }
        update(dt) {
            this._t+=dt; tickDialog(dt);
            if(!this._dq && this._t>1){
                this._dq=true;
                queueDialog('MATT', "...");
                queueDialog('MARK', "Well?");
                queueDialog('MATT', "I'm not gonna say what you want me to say.");
                queueDialog('BRIAN', "You're smiling. YOUR FACE is saying it.");
                queueDialog('MATT', "That's just... low gravity. It lifts the cheeks.");
                queueDialog('MARK', "That's not how gravity works, Matt.");
                queueDialog('MATT', "Oh so NOW you're a scientist. You sound like Bill Nye.");
                queueDialog('BRIAN', "JUST SAY IT WAS COOL");
                queueDialog('MATT', "...the golf cart was aight.");
                if (gs.jabCount > 0) { queueDialog('MATT', "And tell Fauci I want my antibodies back."); queueDialog('BRIAN', "MOON ANTIBODIES LMAOOO"); }
                queueDialog('MARK', "THAT'S ALL WE NEEDED");
                queueDialog('BRIAN', "WE'RE GOING TO DA MOON AGAIN!!!");
                queueDialog('MATT', "I'm keeping the golf club. For research.");
                queueDialog('MATT', "...and the space rat. The rat comes with me.");
            }
            if(this._t>30 && (engine.input.isKeyDown('Space')||engine.input.isKeyDown('Enter'))){
                gs.discoveries=0; gs.found={}; gs.mattAnger=0; gs.mattSecretJoy=0; gs.jabCount=0;
                gs.dialogQueue=[]; gs.dialogActive=false; usedQuotes={};
                engine.switchScene('title','fade');
            }
        }
        drawUI(ctx) {
            ctx.fillStyle='#080810'; ctx.fillRect(0,0,640,360);
            drawStars(ctx,this._stars,1/60,1);
            ctx.fillStyle='#ccccaa'; ctx.beginPath(); ctx.arc(320,300,180,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#aaaaaa88'; ctx.beginPath(); ctx.arc(280,280,20,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(360,310,15,0,Math.PI*2); ctx.fill();
            const b=Math.sin(this._t*2)*3;
            ctx.drawImage(engine.assets.images['mark'],0,0,16,24,234,195+b,32,48);
            ctx.drawImage(engine.assets.images['brian'],0,0,16,24,298,193+b,32,48);
            ctx.drawImage(engine.assets.images['matt'],0,0,16,24,362,197-b*0.5,32,48);
            ctx.font='bold 24px monospace'; ctx.textAlign='center'; ctx.fillStyle='#ffcc00'; ctx.fillText('MISSION COMPLETE',320,55);
            ctx.font='14px monospace'; ctx.fillStyle='#88aacc'; ctx.fillText(`Discoveries: ${gs.discoveries}/${gs.totalDiscoveries}`,320,85);
            ctx.fillStyle='#ff4444'; ctx.fillText(`Matt's Anger: ${gs.mattAnger}%`,320,105);
            ctx.fillStyle='#44ff44'; ctx.fillText(`Secret Joy: ${gs.mattSecretJoy}%`,320,125);
            if(gs.jabCount>0){ctx.fillStyle='#44ccff'; ctx.fillText(`Moon Jabs Received: ${gs.jabCount}`,320,145);}
            ctx.font='bold 14px monospace';
            const vY = gs.jabCount > 0 ? 170 : 155;
            if(gs.mattSecretJoy>gs.mattAnger){ctx.fillStyle='#44ff44'; ctx.fillText('"...the golf cart was aight." — Matt',320,vY);}
            else {ctx.fillStyle='#ff8844'; ctx.fillText('"Low gravity lifts the cheeks." — Matt',320,vY);}
            if(this._t>30&&Math.sin(this._t*4)>0){ctx.font='14px monospace'; ctx.fillStyle='#fff'; ctx.fillText('PRESS SPACE TO GO AGAIN',320,260);}
            ctx.font='10px monospace'; ctx.fillStyle='#444'; ctx.fillText('A Vibe Engine Production',320,340);
            ctx.fillText('"Inspired by real events" (according to Mark)',320,352);
            if(gs.dialogActive&&gs.currentDialog) drawDialog(ctx,gs.currentDialog);
        }
    }

    // =============================================
    //  BOOT
    // =============================================
    generateSprites();
    engine.addScene('title', new TitleScene());
    engine.addScene('launch', new LaunchScene());
    engine.addScene('moon', new MoonScene());
    engine.addScene('lab', new LabScene());
    engine.addScene('ending', new EndingScene());
    engine.start('title');

    </script>
</body>
</html>
