const FLOCK_ORIGIN=params.get('origin')||'';

// ========== MULTIPLAYER ==========
let ws=null,wsRetryTimer=null;
const remotePlayers={};  // id -> {x,y,hp,maxHp,level,kills,alive,username,avatar_url}
const remoteAvatarImgs={};  // id -> Image

function connectParty(){
  if(!PARTY_ID)return;
  try{
    const wsUrl=PARTY_HOST.replace('https://','wss://').replace('http://','ws://')+'/parties/town/'+PARTY_ID;
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{sendPartyUpdate();};
    ws.onmessage=(ev)=>{
      try{
        const d=JSON.parse(ev.data);
        if(d.type==='snapshot'){
          for(const[id,p] of Object.entries(d.state?.players||{})){
            if(id!==USER_ID&&p.mode==='outbreak')registerRemotePlayer(id,p);
          }
        }else if(d.type==='player-update'){
          const p=d.player;
          if(p&&p.id!==USER_ID&&p.mode==='outbreak'){
            const wasAlive=remotePlayers[p.id]?.alive;
            registerRemotePlayer(p.id,p);
            if(wasAlive&&!p.alive&&gs.state==='game')
              floatT(p.x||gs.px,(p.y||gs.py)-40,(p.username||'Ally')+' fell!','#ff6644',true);
          }
        }else if(d.type==='player-leave'){
          delete remotePlayers[d.id];
          // If we're waiting for them to pick, remove from waiting list and re-check
          if(gs.state==='levelup'){gs.partyLevelUpChosen[d.id]=true;checkLevelUpDone();}
        }else if(d.type==='shared-xp'&&d.fromId!==USER_ID&&(gs.state==='game'||gs.state==='levelup')){
          // Teammate collected XP — add to our pool too (shared XP)
          gs.xp+=d.amount;
          checkLevelUp();
        }else if(d.type==='levelup-trigger'&&gs.state==='game'){
          // Teammate triggered level-up — sync us to level up too
          if(gs.level<d.level){
            gs.level=d.level;
            gs.xpNeeded=Math.floor(10*Math.pow(1.55,d.level-1));
            gs.xp=0;
          }
          gs.lvlChoices=generateChoices();gs.lvlSelected=0;
          if(gs.lvlChoices.length===0){const b=Math.ceil(gs.pMaxHP*0.08);gs.pMaxHP+=b;gs.pHP=Math.min(gs.pHP+b,gs.pMaxHP);}
          else{gs.state='levelup';gs.partyLevelUpChosen={};snd('lvlup');}
        }else if(d.type==='levelup-chosen'&&gs.state==='levelup'){
          gs.partyLevelUpChosen[d.fromId]=true;
          checkLevelUpDone();
        }else if(d.type==='levelup-force-end'&&gs.state==='levelup'){
          // Party leader forced the level-up to end
          floatT(gs.px,gs.py-50,'⚡ Leader skipped pick','#ffd700',false);
          // Apply random choice if local player hasn't chosen yet
          if(!gs.partyLevelUpChosen[USER_ID]&&gs.lvlChoices.length>0){
            applyChoice(gs.lvlChoices[gs.lvlSelected]);
          }
          exitLevelUp();
        }else if(d.type==='player-revive'&&d.targetId===USER_ID&&gs.state==='downed'){
          // A teammate revived us!
          gs.pHP=Math.max(40,Math.floor(gs.pMaxHP*0.4));
          gs.state='game';gs.downedTimer=0;gs.pInvince=180;
          spawnP(gs.px,gs.py,'#44ff88',25,6);spawnP(gs.px,gs.py,'#aaddff',15,5);
          floatT(gs.px,gs.py-40,'REVIVED!','#44ff88',true);snd('lvlup');
        }
      }catch(e){}
    };
    ws.onclose=()=>{ws=null;if(PARTY_ID)wsRetryTimer=setTimeout(connectParty,3500);};
    ws.onerror=()=>{};
  }catch(e){}
}

function registerRemotePlayer(id,p){
  remotePlayers[id]={
    id,username:p.username||'Survivor',
    x:p.x||WORLD_W/2,y:p.y||WORLD_H/2,
    hp:p.hp??100,maxHp:p.maxHp??100,
    level:p.level||1,kills:p.kills||0,
    alive:p.alive!==false,
    downed:p.downed===true,
    avatar_url:p.avatar_url||'',
    mode:'outbreak'
  };
  if(p.avatar_url&&!remoteAvatarImgs[id]){
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{remoteAvatarImgs[id]=img;};
    img.onerror=()=>{};
    img.src=p.avatar_url;
  }
}

let _partyTick=0;
function tickParty(){
  _partyTick++;
  if(_partyTick%6===0)sendPartyUpdate();
}

function sendPartyUpdate(){
  if(!ws||ws.readyState!==1)return;
  try{ws.send(JSON.stringify({
    type:'player-update',
    player:{
      id:USER_ID,username:PLAYER_NAME,avatar_url:PLAYER_AVATAR,
      x:gs.px,y:gs.py,
      hp:gs.pHP,maxHp:gs.pMaxHP,
      level:gs.level,kills:gs.kills,
      alive:(gs.state==='game'||gs.state==='levelup'||gs.state==='downed'),
      downed:gs.state==='downed',
      levelingUp:gs.state==='levelup',
      mode:'outbreak',direction:gs.pFacing>0?'right':'left',moving:false
    }
  }));}catch(e){}
}

function leaveParty(){
  if(!ws||ws.readyState!==1)return;
  try{ws.send(JSON.stringify({type:'player-leave'}));}catch(e){}
}

// Party leader = player with lexicographically smallest USER_ID among all connected
function isPartyLeader(){
  return Object.keys(remotePlayers).every(id=>USER_ID<=id);
}

function exitLevelUp(){
  gs.state='game';
  gs.partyLevelUpChosen={};
  gs.lvlChoices=[];
}

// Check if everyone in party has chosen; if so, resume
function checkLevelUpDone(){
  if(!PARTY_ID){exitLevelUp();return;} // solo: exit immediately
  const aliveRemotes=Object.keys(remotePlayers).filter(id=>remotePlayers[id].alive||remotePlayers[id].downed);
  const allIds=[USER_ID,...aliveRemotes];
  if(allIds.every(id=>gs.partyLevelUpChosen[id]))exitLevelUp();
}

function sendPartyXP(amount){
  if(!ws||ws.readyState!==1||!PARTY_ID)return;
  try{ws.send(JSON.stringify({type:'shared-xp',amount,fromId:USER_ID}));}catch(e){}
}

// Returns nearest player target coords for enemy pathfinding
function getNearestTarget(ex,ey){
  let tx=gs.px,ty=gs.py,td=Infinity;
  if(gs.state==='game'||gs.state==='levelup')td=Math.hypot(ex-gs.px,ey-gs.py);
  else{tx=WORLD_W/2;ty=WORLD_H/2;} // wander if local player dead
  for(const rp of Object.values(remotePlayers)){
    if(!rp.alive)continue;
    const d=Math.hypot(ex-rp.x,ey-rp.y);
    if(d<td){tx=rp.x;ty=rp.y;td=d;}
  }
  return{x:tx,y:ty};
}

const _audioBuffers={};
const _audioLoaded={};
function loadAudio(key,path){
  if(_audioLoaded[key])return;
  _audioLoaded[key]=true;
  fetch(path).then(r=>r.arrayBuffer()).then(buf=>{
    if(!AX)return;
    AX.decodeAudioData(buf,decoded=>{_audioBuffers[key]=decoded;});
  }).catch(()=>{});
}
// ── Audio toggle flags — players can mute music/voice independently ──────────

// ── Master mix constants — tune the whole balance here ──────────────────────
const SFX_VOL=0.28;   // global multiplier for all real audio files (wolf, shatter, voice, etc.)
const SND_VOL=0.38;   // global multiplier for all procedural oscillator sounds in snd()
// Note: music kick (_mKick) is NOT affected — it's the star of the mix

function playSFX(key,vol,rate){
  if(!AX||!_audioBuffers[key])return;
  const src=AX.createBufferSource();
  src.buffer=_audioBuffers[key];
  src.playbackRate.value=rate||(0.9+Math.random()*0.2);
  const g=AX.createGain();g.gain.value=(vol||0.4)*SFX_VOL;
  src.connect(g);g.connect(AX.destination);
  src.start();
}

// Female voice cooldown — max one every 20 seconds so she doesn't spam
let _lastFemaleVoiceTime=0;
const FEMALE_VOICE_COOLDOWN=20000; // ms
// Male streak voices always play (they're rare tier events)
const _MALE_VOICE_KEYS=new Set(['outbreak_streak_awake','outbreak_streak_based','outbreak_streak_ascended','outbreak_streak_godtier']);
// Critical story moments always play regardless of cooldown
const _ALWAYS_PLAY_KEYS=new Set(['death','win']);

function playVoice(type){
  if(!voiceEnabled)return;
  const lines=VOICE_LINES[type];if(!lines||!lines.length)return;
  // Rate-limit female voices to once every ~20s
  const isMale=_MALE_VOICE_KEYS.has(type);
  const isAlways=_ALWAYS_PLAY_KEYS.has(type);
  if(!isMale&&!isAlways){
    const now=Date.now();
    if(now-_lastFemaleVoiceTime<FEMALE_VOICE_COOLDOWN)return;
    _lastFemaleVoiceTime=now;
  }
  const idx=(_voiceLineIndex[type]||0)%lines.length;_voiceLineIndex[type]=(idx+1)%lines.length;
  const path='assets/audio/'+lines[idx];
  // Voice volume scales from 0.45 → 0.80 as game approaches end
  const voiceVol=Math.min(0.80,0.45+0.35*Math.min(1,(gs.gameTime||0)/SURVIVE_TIME));
  if(!_audioBuffers[path]){
    fetch(path).then(r=>{if(!r.ok)throw new Error('missing');return r.arrayBuffer();})
    .then(buf=>{if(AX)AX.decodeAudioData(buf,dec=>{_audioBuffers[path]=dec;setTimeout(()=>playSFX(path,voiceVol),50);});})
    .catch(()=>{});
    return;
  }
  playSFX(path,voiceVol);
}

      vJoy.bx=t.clientX;vJoy.by=t.clientY;
      vJoy.dx=0;vJoy.dy=0;vJoy.tapFired=false;
    } else {

      jp['Space']=true;
    }
  }
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===vJoy.id){
      // Scale to canvas coords
      const scaleX=C.width/C.offsetWidth,scaleY=C.height/C.offsetHeight;
      const rx=(t.clientX-vJoy.bx)*scaleX,ry=(t.clientY-vJoy.by)*scaleY;
      const dist=Math.sqrt(rx*rx+ry*ry);
      const maxR=70;
      if(dist>VJOY_DEAD){vJoy.dx=rx/Math.max(dist,maxR);vJoy.dy=ry/Math.max(dist,maxR);}
      else{vJoy.dx=0;vJoy.dy=0;}
    }
  }
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===vJoy.id){
      // Short tap with no drag = confirm
      if(Math.abs(vJoy.dx)<0.1&&Math.abs(vJoy.dy)<0.1&&!vJoy.tapFired){
        jp['Space']=true;vJoy.tapFired=true;
      }
      vJoy.active=false;vJoy.dx=0;vJoy.dy=0;
    }
  }
},{passive:false});

// ========== META PROGRESSION (Vampire Survivors-style PowerUps) ==========
// Separate from Flock economy — stored in outbreak_meta localStorage key
const OUTBREAK_META_KEY='outbreak_meta';
function loadMeta(){try{return JSON.parse(localStorage.getItem(OUTBREAK_META_KEY)||'{}')}catch{return{}}}
function saveMeta(m){try{localStorage.setItem(OUTBREAK_META_KEY,JSON.stringify(m))}catch{}}

// Cached meta stats (prevent localStorage reads every frame)
let _metaCache=null;
function refreshMetaCache(){_metaCache=loadMeta();}
function getMetaStat(stat){
  if(!_metaCache)_metaCache=loadMeta();
  const pu=_metaCache.powerups||{};
  let v=0;
  for(const[k,def]of Object.entries(META_POWERUPS)){
    if(def.stat===stat)v+=def.valPerLvl*(pu[k]||0);
  }
  return v;
}

// Cost formula: InitialCost × 1.4^(rank) — soft exponential, ~30,000g total to max all
// Research: VS recommendation for 5-min web game (1.4× per rank, not opaque global fee)
function metaCost(key){
  const def=META_POWERUPS[key];
  if(!_metaCache)_metaCache=loadMeta();
  const lvl=(_metaCache.powerups||{})[key]||0;
  if(lvl>=def.maxLvl)return Infinity;
  return Math.round(def.baseCost*Math.pow(1.4,lvl));
}

// Moon Essence: VS-style Golden Egg equivalent — 1,000g each, tiny random stat boost, infinite loop
function buyMoonEssence(){
  refreshMetaCache();
  const meta=_metaCache;
  const cost=1000;
  if((meta.goldBank||0)<cost)return false;
  meta.goldBank-=cost;
  meta.essences=(meta.essences||0)+1;
  // Random tiny stat boost (picks from pool)
  const pool=['might','maxhp','movespd','cooldown','area','regen','magnet','amount','crit'];
  // Weighted: more common stats get picked more often
  const weights=[3,3,2,2,2,2,2,1,1];
  const totalW=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*totalW;
  let statPick='might';
  for(let i=0;i<pool.length;i++){r-=weights[i];if(r<=0){statPick=pool[i];break;}}
  const boostAmt=statPick==='amount'?0.1:statPick==='cooldown'?0.005:statPick==='maxhp'||statPick==='regen'?0.5:0.01;
  meta.essenceStats=meta.essenceStats||{};
  meta.essenceStats[statPick]=(meta.essenceStats[statPick]||0)+boostAmt;
  meta.totalSpent=(meta.totalSpent||0)+cost;
  saveMeta(meta);refreshMetaCache();
  return statPick;
}

// Buy one level of a powerup
function buyMetaPowerup(key){
  if(!META_POWERUPS[key])return false;
  refreshMetaCache();
  const meta=_metaCache;
  const cost=metaCost(key);
  const bank=meta.goldBank||0;
  if(bank<cost||cost===Infinity)return false;
  meta.goldBank=bank-cost;
  meta.powerups=meta.powerups||{};
  meta.powerups[key]=(meta.powerups[key]||0)+1;
  meta.totalSpent=(meta.totalSpent||0)+cost;
  saveMeta(meta);
  refreshMetaCache();
  snd('lvlup');
  return true;
}

// ========== STAT HELPERS (identical pattern to Truthseeker) ==========
function getStat(stat){
let v=0;
for(const p of gs.passives){
const def=PASSIVES[p.id];if(!def)continue;
if(def.stat===stat)v+=def.val*p.lvl;
if(def.stat==='all')v+=def.val*p.lvl;
}
// Add permanent meta powerup bonuses (except iron_shell/berserker — handled separately)
if(stat!=='iron_shell'&&stat!=='berserker'&&stat!=='crit'&&stat!=='gold_mult')v+=getMetaStat(stat);
return v;
}
function getMight(){
// Berserker: flat % per streak tier on top of base damage
const berserkerBonus=gs.streakTier*getMetaStat('berserker');
return 1+getStat('might')+berserkerBonus;
}
function getArea(){return 1+getStat('area')}
function getCooldown(){return Math.max(0.25,1-getStat('cooldown'))}
function getProjSpd(){return 1+getStat('projspd')||1}
function getMagnet(){return 80*(1+getStat('magnet'))}
function getGrowth(){return 1+getStat('growth')}
function getMoveSpd(){return(gs.pSpeed+gs.pSpeed*getStat('movespd'))*gs.streakSpdMult[gs.streakTier]}
function getAmt(){return 1+Math.floor(getStat('amount'))}

// ========== SKELETON WALL SPAWN ==========
// Spawns a line of interlocked skeleton_wall segments as a barrier
function spawnWallLine(){
  if(gs.state!=='game')return;
  const ang=Math.random()*Math.PI*2;
  const dist=280+Math.random()*140;
  const lcx=gs.px+Math.cos(ang)*dist;
  const lcy=gs.py+Math.sin(ang)*dist;
  const perpAng=ang+Math.PI/2;
  const count=4+Math.floor(Math.random()*3); // 4–6 segments
  const timeScale=Math.max(0.7,0.55+(gs.gameTime/SURVIVE_TIME)*2.45);
  let spawned=0;
  for(let i=0;i<count;i++){
    const offset=i-(count-1)/2;
    const wx=lcx+Math.cos(perpAng)*offset*38;
    const wy=lcy+Math.sin(perpAng)*offset*38;
    if(wx<50||wx>WORLD_W-50||wy<50||wy>WORLD_H-50)continue;
    const def=ENEMY_DEFS.skeleton_wall;
    const e=Object.assign({},def,{
      type:'skeleton_wall',x:wx,y:wy,vx:0,vy:0,
      flash:0,onFire:0,frozen:0,active:true,bob:0,isBoss:false,
      _riseAnim:0,defPct:def.defPct
    });
    e.hp=Math.round(def.hp*Math.min(timeScale,2.2));e.maxHp=e.hp;
    e.dmg=def.dmg;e.xp=def.xp;e.size=def.size;e.spd=0;
    gs.enemies.push(e);spawned++;
  }
  if(spawned>0){
    snd('shatter');
    spawnP(lcx,lcy,'#ccbb88',16,10,3);
    floatT(gs.px,gs.py-50,'💀 BONE WALL!','#ccbb88',true);
  }
}

// ========== STREAK ==========
function updateStreak(){
let newTier=0;
for(let i=gs.streakThresholds.length-1;i>=0;i--){if(gs.streakKills>=gs.streakThresholds[i]){newTier=i;break}}
if(newTier>gs.streakTier){
gs.streakTier=newTier;snd('lvlup');
const streakVoiceKeys=['','outbreak_streak_awake','outbreak_streak_based','outbreak_streak_ascended','outbreak_streak_godtier'];
if(streakVoiceKeys[newTier])playVoice(streakVoiceKeys[newTier]);
floatT(gs.px,gs.py-30,gs.streakNames[newTier],gs.streakColors[newTier],true);
if(gs.streakQuotes[newTier])floatT(gs.px,gs.py-62,gs.streakQuotes[newTier],'rgba(255,255,255,0.8)',false);
gs.shakeDur=4+newTier*2;gs.flash=4+newTier*2;gs.flashColor=gs.streakColors[newTier];
if(newTier>=4){
gs.shakeDur=18;gs.flash=14;gs.flashColor='#ffcc00';gs.hitFreeze=8;
spawnP(gs.px,gs.py,'#ffcc00',35,8);spawnP(gs.px,gs.py,'#ff6600',20,7);spawnP(gs.px,gs.py,'#ffffff',15,6);
for(const e of gs.enemies){if(e.active)hitEnemy(e,40)}
}}}

  const passFull=gs.passives.length>=gs.maxPassives;
  // VS logic: if slots full, only offer upgrades for owned items — never new ones
  const availW=Object.keys(WEAPONS).filter(k=>{
    const owned=gs.weapons.find(w=>w.id===k);
    if(owned)return owned.lvl<WEAPONS[k].maxLvl; // upgrade available
    return !weapFull; // new weapon only if there's a free slot
  });
  const availP=Object.keys(PASSIVES).filter(k=>{
    const owned=gs.passives.find(p=>p.id===k);
    if(owned)return owned.lvl<8; // upgrade available
    return !passFull; // new passive only if there's a free slot
  });
  const pool=[...availW.map(k=>({id:k,isWeapon:true})),...availP.map(k=>({id:k,isWeapon:false}))];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
  for(let i=0;i<Math.min(3,pool.length);i++)choices.push(pool[i]);
  return choices;
}
function applyChoice(choice){
if(choice.isWeapon){
const existing=gs.weapons.find(w=>w.id===choice.id);
if(existing){existing.lvl++;existing.cd=0}
else if(gs.weapons.length<gs.maxWeapons){gs.weapons.push({id:choice.id,lvl:1,cd:0,_orbs:null})}
}else{
const existing=gs.passives.find(p=>p.id===choice.id);
if(existing)existing.lvl++;
else if(gs.passives.length<gs.maxPassives)gs.passives.push({id:choice.id,lvl:1});
}
gs.pMaxHP=100*(1+getStat('maxhp'));
}

else if(fx.type==='pierce'){

fx.x+=fx.vx;fx.y+=fx.vy;
for(const e of gs.enemies){if(!e.active)continue;if(Math.hypot(e.x-fx.x,e.y-fx.y)<e.size+fx.size){hitEnemy(e,fx.dmg)}}
}

else if(fx.type==='axe'){
fx.rot=(fx.rot||0)+0.25;
fx.x+=fx.vx;fx.y+=fx.vy;fx.vy+=0.18;
for(const e of gs.enemies){if(!e.active)continue;if(Math.hypot(e.x-fx.x,e.y-fx.y)<e.size+fx.size){hitEnemy(e,fx.dmg)}}
}
else if(fx.type==='arrow'){
fx.x+=fx.vx;fx.y+=fx.vy;
for(const e of gs.enemies){if(!e.active)continue;if(Math.hypot(e.x-fx.x,e.y-fx.y)<e.size+fx.size){hitEnemy(e,fx.dmg);gs.weaponFX.splice(i,1);break}}
}
else if(fx.type==='pie_flight'){
// Arc toward target
const t=1-(fx.life/fx.maxLife);
fx.x=lerp(fx.x,fx.tx,0.12);fx.y=lerp(fx.y,fx.ty,0.12);
fx.rot=(fx.rot||0)+0.25;
if(fx.life<=1){

}}
else if(fx.type==='fire_patch'){

if(gs.frame%8===0){

}
}
else if(fx.type==='vortex_pull'){

// ========== UPDATE ==========
function update(){
pollGP();gs.time++;gs.frame++;
if(gs.hitFreeze>0){gs.hitFreeze--;return}
if(gs.shakeDur>0){gs.shakeX=(Math.random()-0.5)*7;gs.shakeY=(Math.random()-0.5)*7;gs.shakeDur--}else{gs.shakeX=0;gs.shakeY=0}
if(gs.flash>0)gs.flash--;

// ===== TITLE =====
if(gs.state==='title'){
// P key or select button opens PowerUps shop
if(jp['KeyP']||jp['KeyU']||gp.jp[6]){gs.state='powerups';gs.puSelected=0;snd('select');}
else if(anyP()||confirmP()){initA();startGame()}
for(const k in jp)jp[k]=false;gp.jp.fill(false);return
}

// ===== POWERUP SHOP =====
if(gs.state==='powerups'){
  const filtered=META_PU_KEYS.filter(k=>gs.puCategory==='all'||META_POWERUPS[k].category===gs.puCategory);
  // Navigate
  if(jp['ArrowLeft']||jp['KeyA']||gp.jp[14]){gs.puSelected=Math.max(0,gs.puSelected-1);snd('select')}
  if(jp['ArrowRight']||jp['KeyD']||gp.jp[15]){gs.puSelected=Math.min(filtered.length-1,gs.puSelected+1);snd('select')}
  if(jp['ArrowUp']||jp['KeyW']||gp.jp[12]){gs.puSelected=Math.max(0,gs.puSelected-4);snd('select')}
  if(jp['ArrowDown']||jp['KeyS']||gp.jp[13]){gs.puSelected=Math.min(filtered.length-1,gs.puSelected+4);snd('select')}
  // Cycle category filter
  if(jp['Tab']){
    const ci=(META_CATEGORIES.indexOf(gs.puCategory)+1)%META_CATEGORIES.length;
    gs.puCategory=META_CATEGORIES[ci];gs.puSelected=0;snd('select');
  }
  // Buy
  if(confirmP()&&filtered.length>0){
    const key=filtered[gs.puSelected];
    if(buyMetaPowerup(key)){
      spawnP(C.width/2,C.height/2,'#ffd700',16,6);
    }else{snd('hit');}
  }
  // Close
  if(jp['Escape']||jp['KeyP']||jp['KeyU']||gp.jp[6]){gs.state='title';snd('select');}
  for(const k in jp)jp[k]=false;gp.jp.fill(false);return
}

// ===== GAME OVER =====
if(gs.state==='dead'||gs.state==='win'){
if(confirmP()){
leaveParty();
if(FLOCK_ORIGIN&&window.opener){window.opener.postMessage({type:'game_over',survived:gs.survived,kills:gs.kills},FLOCK_ORIGIN);window.close()}
else{gs.state='title';resetGame()}
}
for(const k in jp)jp[k]=false;gp.jp.fill(false);return
}

// ===== LEVEL UP — PAUSES GAME, WAITS FOR ALL PARTY MEMBERS =====
if(gs.state==='levelup'){
// Safety net: if we somehow ended up here with no choices, escape immediately
if(gs.lvlChoices.length===0){exitLevelUp();return;}
gs.frame++;gs.time++;tickParty();
// Navigate cards
if(jp['ArrowLeft']||jp['KeyA']||gp.jp[14]){gs.lvlSelected=(gs.lvlSelected-1+gs.lvlChoices.length)%gs.lvlChoices.length;snd('select')}
if(jp['ArrowRight']||jp['KeyD']||gp.jp[15]){gs.lvlSelected=(gs.lvlSelected+1)%gs.lvlChoices.length;snd('select')}
if(jp['Tab']){gs.lvlChoices=generateChoices();gs.lvlSelected=0;snd('select')} // reroll
// Confirm pick — only if we haven't chosen yet
if(confirmP()&&gs.lvlChoices.length>0&&!gs.partyLevelUpChosen[USER_ID]){
  const _chosen=gs.lvlChoices[gs.lvlSelected];
  applyChoice(_chosen);
  if(VOICE_LINES[_chosen.id])playVoice(_chosen.id);
  gs.partyLevelUpChosen[USER_ID]=true;
  // Broadcast choice to party
  if(PARTY_ID&&ws&&ws.readyState===1){
    try{ws.send(JSON.stringify({type:'levelup-chosen',fromId:USER_ID}));}catch(e){}
  }
  snd('lvlup');
  checkLevelUpDone();
}
// Party leader force-end (multiplayer only)
if(PARTY_ID&&isPartyLeader()&&(jp['KeyF']||gp.jp[6])&&Object.keys(remotePlayers).length>0){
  if(PARTY_ID&&ws&&ws.readyState===1){
    try{ws.send(JSON.stringify({type:'levelup-force-end'}));}catch(e){}
  }
  // Apply random choice for anyone who hasn't picked (local auto-picks)
  if(!gs.partyLevelUpChosen[USER_ID]&&gs.lvlChoices.length>0){
    applyChoice(gs.lvlChoices[gs.lvlSelected]);
  }
  exitLevelUp();
}
for(const k in jp)jp[k]=false;gp.jp.fill(false);return
}

// ===== DOWNED STATE (co-op only) =====
if(gs.state==='downed'){
gs.frame++;gs.time++;tickParty();
gs.camX=gs.px-C.width/2;gs.camY=gs.py-C.height/2;
gs.camX=Math.max(0,Math.min(WORLD_W-C.width,gs.camX));
gs.camY=Math.max(0,Math.min(WORLD_H-C.height,gs.camY));
gs.downedTimer--;
if(gs.downedTimer<=0){
  // Countdown expired — permanent death
  const anyAlive=Object.values(remotePlayers).some(rp=>rp.alive&&!rp.downed);
  if(!anyAlive){gs.state='dead';saveRun();gs.survived=false;snd('death');playVoice('death');}
  else{gs.downedTimer=1;} // keep waiting while a teammate is still up
}
if(gs.pInvince>0)gs.pInvince--;
for(let i=gs.enemies.length-1;i>=0;i--){
  const e=gs.enemies[i];if(!e.active)continue;

}

// ========== WORLD DECORATION ==========
// Deterministic seeded placement — drawn from world coord hash
function drawWorldDecor(cx,cy){
  // Dense grass layer first (small cell, very frequent)
  const gcell=80;
  const gsc=Math.floor(cx/gcell)-1,gec=Math.ceil((cx+C.width)/gcell)+1;
  const gsr2=Math.floor(cy/gcell)-1,ger=Math.ceil((cy+C.height)/gcell)+1;
  for(let gx=gsc;gx<=gec;gx++){for(let gy=gsr2;gy<=ger;gy++){
    const gh=((gx*374761)^(gy*668265)^(gx*gy*1234567))>>>0;
    if((gh%100)>38)continue; // ~38% of cells get grass tufts
    const r1=(gh&0xFF)/255,r2=((gh>>8)&0xFF)/255;
    const wx=gx*gcell+r1*gcell*0.85+gcell*0.07;
    const wy=gy*gcell+r2*gcell*0.85+gcell*0.07;
    if(wx<20||wx>WORLD_W-20||wy<20||wy>WORLD_H-20)continue;
    if(Math.abs(wx-WORLD_W/2)<180&&Math.abs(wy-WORLD_H/2)<180)continue;
    _dGrass(wx-cx,wy-cy,(gh>>16)&0xFF);
  }}
  // Larger props (trees, rocks, fire pits, ruins)
  const cellSize=220;
  const sc=Math.floor(cx/cellSize)-1,ec=Math.ceil((cx+C.width)/cellSize)+1;
  const sr=Math.floor(cy/cellSize)-1,er=Math.ceil((cy+C.height)/cellSize)+1;
  for(let gx=sc;gx<=ec;gx++){for(let gy=sr;gy<=er;gy++){
    const h=((gx*73856093)^(gy*19349663)^(gx*gy*2654435761))>>>0;
    const r1=(h&0xFF)/255,r2=((h>>8)&0xFF)/255,r3=((h>>16)&0xFF)/255,r4=((h>>24)&0xFF)/255;
    const wx=gx*cellSize+r1*cellSize*0.8+cellSize*0.1;
    const wy=gy*cellSize+r2*cellSize*0.8+cellSize*0.1;
    if(wx<30||wx>WORLD_W-30||wy<30||wy>WORLD_H-30)continue;
    if(Math.abs(wx-WORLD_W/2)<200&&Math.abs(wy-WORLD_H/2)<200)continue;
    const sx=wx-cx,sy=wy-cy;
    if(r3<0.48){_dTree(sx,sy,16+r4*26,r1);}
    else if(r3<0.65){_dRock(sx,sy,10+r4*18,r2);}
    else if(r3<0.76){_dFire(sx,sy,r1);}
    else if(r3<0.83){_dRuin(sx,sy,r4);}
  }}
}

// Grass tuft — VS style: 2-4 blades per cluster, dark olive green
function _dGrass(sx,sy,seed){
  X.save();X.globalAlpha=0.55;
  const blades=2+((seed>>2)%3);
  const spread=7+((seed>>4)%6);
  const gc=['#243d1a','#1e3516','#2a4420','#1a2e14'][(seed>>6)%4];
  X.strokeStyle=gc;X.lineWidth=1.5;X.lineCap='round';
  for(let b=0;b<blades;b++){
    const bx=sx+(((seed*17+b*31)%spread)-(spread/2));
    const bh=5+((seed*b*7)%6);
    const lean=(((seed+b)*13)%8)-4;
    X.beginPath();X.moveTo(bx,sy);X.quadraticCurveTo(bx+lean,sy-bh*0.5,bx+lean*1.4,sy-bh);X.stroke();
  }
  X.restore();
}

// Tree — VS style: stacked layered canopy, dark + depth
function _dTree(sx,sy,sz,seed){
  X.save();X.globalAlpha=0.88;
  // Drop shadow
  X.fillStyle='rgba(0,0,0,0.22)';X.beginPath();X.ellipse(sx,sy+sz*0.5,sz*0.65,sz*0.2,0,0,Math.PI*2);X.fill();
  // Trunk
  X.fillStyle='#2e1f0e';X.fillRect(sx-sz*0.10,sy,sz*0.20,sz*0.55);
  // Choose canopy colors by seed
  const dark=['#0d1f0a','#0a1c08','#0e2210','#111f0c'][(seed*4|0)%4];
  const mid=['#163012','#122a10','#183514','#14280e'][(seed*7|0)%4];
  const light='#1e3d18';
  // Bottom layer (widest, darkest) — slightly elliptical
  X.fillStyle=dark;X.shadowColor='#050e04';X.shadowBlur=12;
  X.beginPath();X.ellipse(sx,sy-sz*0.05,sz*0.88,sz*0.62,0,0,Math.PI*2);X.fill();
  // Middle layer
  X.fillStyle=mid;X.shadowBlur=8;
  X.beginPath();X.ellipse(sx+sz*0.06,sy-sz*0.42,sz*0.72,sz*0.52,0,0,Math.PI*2);X.fill();
  // Top layer (smallest, lightest)
  X.fillStyle=light;X.shadowBlur=5;
  X.beginPath();X.ellipse(sx-sz*0.04,sy-sz*0.76,sz*0.48,sz*0.38,0,0,Math.PI*2);X.fill();
  // Highlight glint top-left
  X.globalAlpha=0.12;X.fillStyle='#6aaa44';X.shadowBlur=0;
  X.beginPath();X.ellipse(sx-sz*0.22,sy-sz*0.85,sz*0.18,sz*0.13,0,0,Math.PI*2);X.fill();
  X.restore();X.shadowBlur=0;
}

// Rock — chunky, VS style
function _dRock(sx,sy,sz,seed){
  X.save();X.globalAlpha=0.70;
  X.fillStyle='rgba(0,0,0,0.2)';X.beginPath();X.ellipse(sx,sy+sz*0.25,sz*0.58,sz*0.16,0,0,Math.PI*2);X.fill();
  X.shadowColor='#000';X.shadowBlur=6;
  X.fillStyle='#3a3830';
  X.beginPath();X.moveTo(sx-sz*0.55,sy+sz*0.3);X.lineTo(sx-sz*0.65,sy-sz*0.05);X.lineTo(sx-sz*0.3,sy-sz*0.45);X.lineTo(sx+sz*0.12,sy-sz*0.52);X.lineTo(sx+sz*0.60,sy-sz*0.1);X.lineTo(sx+sz*0.54,sy+sz*0.3);X.closePath();X.fill();

  X.fillStyle='rgba(255,255,255,0.07)';
  X.beginPath();X.moveTo(sx-sz*0.3,sy-sz*0.45);X.lineTo(sx-sz*0.12,sy-sz*0.48);X.lineTo(sx-sz*0.18,sy-sz*0.28);X.closePath();X.fill();

// Fire pit — VS style: stone ring + dramatic animated flames
function _dFire(sx,sy,seed){
  const t2=gs.time*0.18+seed*6.28;
  X.save();
  // Glow on ground
  X.globalAlpha=0.18+Math.sin(t2)*0.06;
  const gg=X.createRadialGradient(sx,sy,0,sx,sy,32);
  gg.addColorStop(0,'rgba(255,140,0,0.7)');gg.addColorStop(1,'rgba(255,60,0,0)');
  X.fillStyle=gg;X.beginPath();X.arc(sx,sy,32,0,Math.PI*2);X.fill();
  // Stone ring — 7 irregular stones in a circle
  X.globalAlpha=0.92;
  for(let si=0;si<7;si++){
    const sa=si*(Math.PI*2/7)+(seed*0.8);
    const sr2=10;const stone_x=sx+Math.cos(sa)*sr2,stone_y=sy+Math.sin(sa)*sr2*0.65;
    X.fillStyle=['#4a4540','#3e3a36','#524e48','#403c38'][si%4];
    X.beginPath();X.ellipse(stone_x,stone_y,3.5+((si*37+seed*100|0)%3),2.5,sa,0,Math.PI*2);X.fill();
  }
  // Burning logs
  X.globalAlpha=0.8;
  X.fillStyle='#2a1005';X.strokeStyle='#3d1a08';X.lineWidth=3.5;X.lineCap='round';
  X.beginPath();X.moveTo(sx-7,sy+2);X.lineTo(sx+7,sy-2);X.stroke();
  X.beginPath();X.moveTo(sx-5,sy-3);X.lineTo(sx+6,sy+4);X.stroke();
  // Embers
  X.globalAlpha=0.6;
  for(let ei=0;ei<4;ei++){
    const ea=t2*0.7+ei*(Math.PI/2);
    X.fillStyle='#ff6600';X.shadowColor='#ff4400';X.shadowBlur=4;
    X.beginPath();X.arc(sx+Math.cos(ea)*4,sy+Math.sin(ea)*2.5-1,1.2,0,Math.PI*2);X.fill();
  }
  // Flames — tall, narrow, VS style
  X.shadowColor='#ff6600';X.shadowBlur=22+Math.sin(t2)*8;
  for(let fi=0;fi<5;fi++){
    const fa=fi*(Math.PI*2/5)+t2*0.4;
    const fx=sx+Math.cos(fa)*3.5;const fw=2.5+Math.sin(t2*1.2+fi)*1;
    const fh=12+Math.sin(t2*1.1+fi*0.8)*5;
    const flg=X.createLinearGradient(fx,sy,fx,sy-fh-4);
    flg.addColorStop(0,'rgba(255,240,60,0.95)');flg.addColorStop(0.3,'rgba(255,100,0,0.85)');flg.addColorStop(0.7,'rgba(220,40,0,0.5)');flg.addColorStop(1,'rgba(150,0,0,0)');
    X.fillStyle=flg;X.globalAlpha=0.82;
    X.beginPath();X.moveTo(fx-fw,sy);X.quadraticCurveTo(fx+fw*0.5,sy-fh*0.5,fx,sy-fh);X.quadraticCurveTo(fx-fw*0.4,sy-fh*0.5,fx+fw,sy);X.closePath();X.fill();
  }
  X.restore();X.shadowBlur=0;
}

// Ruin — crumbling stone wall, VS style
function _dRuin(sx,sy,seed){
  X.save();X.globalAlpha=0.65;
  const w=20+seed*24,h=14+seed*18;
  // Wall body — rough stone color
  X.fillStyle='rgba(0,0,0,0.18)';X.beginPath();X.ellipse(sx,sy+4,w*0.55,6,0,0,Math.PI*2);X.fill();
  X.fillStyle='#322e28';X.fillRect(sx-w/2,sy-h,w,h);
  // Stone blocks
  X.strokeStyle='#1e1b18';X.lineWidth=1;
  for(let row=0;row<3;row++){
    const ry=sy-h+row*(h/3);
    for(let col=0;col<3;col++){const cx2=sx-w/2+col*(w/3);X.strokeRect(cx2+1,ry+1,w/3-2,h/3-1);}
  }
  // Crumbled top edge — jagged
  X.fillStyle='#322e28';
  X.beginPath();X.moveTo(sx-w/2,sy-h);
  for(let jx=0;jx<=4;jx++){X.lineTo(sx-w/2+jx*(w/4),sy-h-((seed*17+jx*7)%9));}
  X.lineTo(sx+w/2,sy-h);X.closePath();X.fill();
  // Dark window/void
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(sx-5,sy-h+3,10,8);
  // Moss/vines hint on side
  X.globalAlpha=0.3;X.fillStyle='#1e3a0e';X.fillRect(sx-w/2,sy-h+2,3,h-2);
  X.restore();
}

X.beginPath();X.arc(ex+s*0.33,ey-s*1.28,s*0.1,0,Math.PI*2);X.fill();
// Pupils
X.fillStyle='#000';X.shadowBlur=0;
X.beginPath();X.ellipse(ex-s*0.15,ey-s*1.37,s*0.03,s*0.08,0,0,Math.PI*2);X.fill();
X.beginPath();X.ellipse(ex+s*0.33,ey-s*1.28,s*0.03,s*0.08,0,0,Math.PI*2);X.fill();
// Horns
X.fillStyle=e.flash>0?'#ccffcc':'#446644';
X.beginPath();X.moveTo(ex-s*0.17,ey-s*1.44);X.lineTo(ex-s*0.36,ey-s*1.78);X.lineTo(ex-s*0.07,ey-s*1.44);X.closePath();X.fill();
X.beginPath();X.moveTo(ex+s*0.17,ey-s*1.44);X.lineTo(ex+s*0.36,ey-s*1.78);X.lineTo(ex+s*0.07,ey-s*1.44);X.closePath();X.fill();
// Tail
X.strokeStyle=fc;X.lineWidth=s*0.17;X.lineCap='round';
X.beginPath();X.moveTo(ex,ey+s*0.88);X.quadraticCurveTo(ex-s*1.05,ey+s*1.32+Math.sin(e.bob*0.5)*s*0.18,ex-s*0.6,ey+s*1.65);X.stroke();
// Tail spike
X.fillStyle=e.flash>0?'#ccffcc':'#446644';
X.beginPath();X.moveTo(ex-s*0.6,ey+s*1.65);X.lineTo(ex-s*0.8,ey+s*1.72);X.lineTo(ex-s*0.52,ey+s*1.78);X.closePath();X.fill();
X.restore();
}else if(e.type==='moon_wraith'){
X.save();
// Orbiting soul orbs (behind body)
X.shadowColor='#88aaff';X.shadowBlur=14;
for(let o=0;o<3;o++){
const oa=ph*1.3+o*(Math.PI*2/3);
X.fillStyle=`rgba(100,130,255,${0.32+Math.sin(ph+o)*0.18})`;
X.beginPath();X.arc(ex+Math.cos(oa)*s*1.18,ey+Math.sin(oa)*s*0.65,s*0.14,0,Math.PI*2);X.fill();
}
// Body glow gradient
X.shadowColor='#6688ff';X.shadowBlur=38+Math.sin(ph)*12;
const wg=X.createRadialGradient(ex,ey-s*0.22,s*0.08,ex,ey-s*0.22,s*1.05);
wg.addColorStop(0,e.flash>0?'rgba(255,255,255,0.98)':'rgba(130,155,255,0.95)');
wg.addColorStop(0.4,e.flash>0?'rgba(200,200,255,0.7)':'rgba(45,65,210,0.68)');
wg.addColorStop(1,'rgba(15,15,75,0)');
X.fillStyle=wg;X.beginPath();X.arc(ex,ey-s*0.22,s*0.98,0,Math.PI*2);X.fill();
// Ethereal wispy tendrils (bottom)
X.shadowBlur=0;
for(let w=0;w<5;w++){
const wx=ex+(-2+w)*s*0.27;
const wo=Math.sin(ph+w*1.28)*s*0.22;
X.strokeStyle=e.flash>0?`rgba(255,255,255,0.5)`:`rgba(80,105,255,${0.28+w*0.04})`;
X.lineWidth=s*0.07+Math.sin(ph+w)*s*0.024;X.lineCap='round';
X.beginPath();X.moveTo(wx,ey+s*0.38);X.quadraticCurveTo(wx+wo,ey+s*0.75,wx+wo*0.5,ey+s*1.22+Math.sin(ph+w*0.68)*s*0.18);X.stroke();
}
// Dark hood overlay
X.fillStyle=e.flash>0?'rgba(200,200,255,0.2)':'rgba(4,4,28,0.62)';
X.beginPath();X.ellipse(ex,ey-s*0.52,s*0.68,s*0.54,0,0,Math.PI);X.fill();
// Inner void / dark face
X.fillStyle=e.flash>0?'rgba(255,255,255,0.1)':'rgba(2,2,20,0.55)';
X.beginPath();X.ellipse(ex,ey-s*0.46,s*0.46,s*0.38,0,0,Math.PI*2);X.fill();
// 3 glowing eye orbs
const eyePts=[{ox:-0.24,oy:-0.56},{ox:0.24,oy:-0.59},{ox:0,oy:-0.38}];
eyePts.forEach((ep,i)=>{
const epp=ph+i*1.18;const ebb=Math.sin(epp)*s*0.038;
X.shadowColor='#aabbff';X.shadowBlur=14;
X.fillStyle=e.flash>0?'#ffffff':'#aac0ff';
X.beginPath();X.arc(ex+ep.ox*s,ey+ep.oy*s+ebb,s*0.11,0,Math.PI*2);X.fill();
X.shadowBlur=0;X.fillStyle='#eef4ff';
X.beginPath();X.arc(ex+ep.ox*s,ey+ep.oy*s+ebb,s*0.05,0,Math.PI*2);X.fill();
// Pupil slit
X.fillStyle='rgba(0,0,20,0.7)';
X.beginPath();X.ellipse(ex+ep.ox*s,ey+ep.oy*s+ebb,s*0.02,s*0.07,0,0,Math.PI*2);X.fill();
});
// Crown of bone-white shards
X.fillStyle=e.flash>0?'#eef':'#ccd4ff';X.shadowColor='#aabbff';X.shadowBlur=8;
for(let c=0;c<5;c++){const ca=-Math.PI*0.75+c*(Math.PI*0.35);const cl=s*(0.82+Math.sin(c*1.8)*0.12);
X.beginPath();X.moveTo(ex+Math.cos(ca-0.1)*s*0.75,ey-s*0.18+Math.sin(ca-0.1)*s*0.75);
X.lineTo(ex+Math.cos(ca)*cl,ey-s*0.18+Math.sin(ca)*cl);
X.lineTo(ex+Math.cos(ca+0.1)*s*0.75,ey-s*0.18+Math.sin(ca+0.1)*s*0.75);
X.closePath();X.fill();}
X.restore();
}else{
// Fallback for future boss types
X.save();X.shadowColor=e.color;X.shadowBlur=20;
X.fillStyle=e.flash>0?'#ffffff':e.color;X.beginPath();X.arc(ex,ey,s,0,Math.PI*2);X.fill();X.restore();
X.font='28px serif';X.textAlign='center';X.textBaseline='middle';X.fillText(e.emoji,ex,ey);
}
}
function drawPlayer(cx,cy){
const px=gs.px-cx,py=gs.py-cy;
const bob=Math.sin(gs.pBob)*2;

// Shadow
X.save();X.globalAlpha=0.25;X.fillStyle='#000';X.beginPath();X.ellipse(px,py+18,14,6,0,0,Math.PI*2);X.fill();X.restore();

// Glow ring
if(gs.streakTier>0){
const gc=gs.streakColors[gs.streakTier];
X.save();X.shadowColor=gc;X.shadowBlur=18+gs.streakTier*4;
X.strokeStyle=gc;X.lineWidth=2.5;X.globalAlpha=0.6+Math.sin(gs.time*0.08)*0.2;
X.beginPath();X.arc(px,py+bob,21,0,Math.PI*2);X.stroke();
X.restore();
}

// Avatar circle
X.save();
X.beginPath();X.arc(px,py+bob,18,0,Math.PI*2);X.clip();
if(avatarImg){
  if(gs.pFacing<0){
    X.translate(px*2,0);X.scale(-1,1);
    X.drawImage(avatarImg,px-18,py+bob-18,36,36);
  }else{
    X.drawImage(avatarImg,px-18,py+bob-18,36,36);
  }
}else{X.fillStyle='#446688';X.fill();X.fillStyle='#fff';X.font='bold 16px monospace';X.textAlign='center';X.textBaseline='middle';X.fillText((PLAYER_NAME[0]||'?').toUpperCase(),px,py+bob);}
X.restore();

// Invince flash
if(gs.pInvince>0&&gs.pInvince%4<2){X.save();X.globalAlpha=0.5;X.strokeStyle='#ff4444';X.lineWidth=3;X.beginPath();X.arc(px,py+bob,19,0,Math.PI*2);X.stroke();X.restore();}

// Name tag
X.save();X.font='bold 11px monospace';X.fillStyle='#fff';X.strokeStyle='#000';X.lineWidth=2.5;X.textAlign='center';X.textBaseline='top';
X.strokeText(PLAYER_NAME,px,py+bob+22);X.fillText(PLAYER_NAME,px,py+bob+22);X.restore();
}

function draw(){
const cx=gs.camX+gs.shakeX,cy=gs.camY+gs.shakeY;
X.clearRect(0,0,C.width,C.height);

if(gs.state==='title'){drawTitle();return}
if(gs.state==='powerups'){drawPowerUps();return}

// Zoom in — scale world around canvas center so player stays centered
X.save();
X.translate(C.width/2,C.height/2);
X.scale(ZOOM,ZOOM);
X.translate(-C.width/2,-C.height/2);

// ===== WORLD =====
// Ground — VS-style: varied dark green with noise patches, no harsh grid
// Ground — flat green base. Grass blade detail comes from drawWorldDecor.
X.fillStyle='#1a2816';X.fillRect(0,0,C.width,C.height);

// ===== WORLD DECORATIONS (trees, rocks, fire pits, ruins) =====
if(gs.state==='game'||gs.state==='downed'||gs.state==='levelup')drawWorldDecor(cx,cy);

// ===== DROPS =====
for(const p of gs.pills){
const px2=p.x-cx,py2=p.y-cy;
const pulse=0.8+Math.sin(gs.time*0.12+p.x)*0.18;
X.globalAlpha=pulse;
X.save();
X.shadowColor=p.color;X.shadowBlur=10;
// Crystal: hexagon shape
X.fillStyle=p.color;
X.beginPath();
for(let h=0;h<6;h++){const ha=h*(Math.PI/3)-(Math.PI/6);X.lineTo(px2+Math.cos(ha)*p.size,py2+Math.sin(ha)*p.size);}
X.closePath();X.fill();
// Inner highlight
X.globalAlpha=pulse*0.5;X.fillStyle='#ffffff';
X.beginPath();
X.moveTo(px2,py2-p.size*0.5);X.lineTo(px2+p.size*0.3,py2);X.lineTo(px2,py2+p.size*0.2);X.closePath();X.fill();
X.restore();X.shadowBlur=0;
}
for(const f of gs.foods){
X.globalAlpha=0.9;X.font='14px serif';X.textAlign='center';X.textBaseline='middle';
X.fillText('❤️',f.x-cx,f.y-cy);
}
// Gold coins — BTC-style orange coin with ₿ symbol
for(const g of gs.goldGems){
const gx=g.x-cx,gy=g.y-cy;
const pulse=0.82+Math.sin(gs.time*0.18+g.x*0.05)*0.18;
X.save();
X.globalAlpha=pulse;
// BTC orange glow
X.shadowColor='#f7931a';X.shadowBlur=g.val>=5?20:g.val>=3?15:10;
// Drop shadow
X.fillStyle='rgba(0,0,0,0.3)';X.beginPath();X.ellipse(gx+1,gy+3,g.size*0.88,g.size*0.28,0,0,Math.PI*2);X.fill();
// Coin body — BTC orange gradient
const coinGrad=X.createRadialGradient(gx-g.size*0.3,gy-g.size*0.3,1,gx,gy,g.size);
coinGrad.addColorStop(0,'#ffdd88');coinGrad.addColorStop(0.4,'#f7931a');coinGrad.addColorStop(1,'#8B4500');
X.fillStyle=coinGrad;X.beginPath();X.arc(gx,gy,g.size,0,Math.PI*2);X.fill();
// Rim
X.strokeStyle='rgba(255,200,80,0.55)';X.lineWidth=1.5;X.beginPath();X.arc(gx,gy,g.size,0,Math.PI*2);X.stroke();
// ₿ symbol
X.shadowBlur=0;X.globalAlpha=pulse;
X.font='bold '+(g.size*1.2)+'px sans-serif';X.fillStyle='#5a2a00';X.textAlign='center';X.textBaseline='middle';
X.fillText('₿',gx+0.5,gy+1);
X.restore();X.shadowBlur=0;
}
// Chests — VS-style glowing treasure
for(const ch of gs.chests){
if(ch.open)continue; // skip opened chests
const chx=ch.x-cx,chy=ch.y-cy;
const pulse=Math.sin(gs.time*0.12)*0.5+0.5; // 0→1 pulse
X.save();
// Outer beacon beam (vertical gold pillar — visible from far away)
const beamGrad=X.createLinearGradient(chx,chy-80,chx,chy);
beamGrad.addColorStop(0,'rgba(255,215,0,0)');
beamGrad.addColorStop(0.6,'rgba(255,215,0,0.18)');
beamGrad.addColorStop(1,'rgba(255,215,0,0.5)');
X.fillStyle=beamGrad;X.fillRect(chx-8,chy-80,16,80);
// Ground glow
X.shadowColor='#ffd700';X.shadowBlur=28+pulse*18;
X.globalAlpha=0.45+pulse*0.25;
X.fillStyle='#ffd700';X.beginPath();X.ellipse(chx,chy+2,ch.size*2.2,ch.size*0.7,0,0,Math.PI*2);X.fill();
// Pulsing outer ring
X.globalAlpha=0.35+pulse*0.35;
X.strokeStyle='#ffd700';X.lineWidth=2.5+pulse*1.5;
X.beginPath();X.arc(chx,chy,ch.size+8+pulse*4,0,Math.PI*2);X.stroke();
// Inner sparkle ring
X.globalAlpha=0.6+pulse*0.3;X.strokeStyle='#fffde0';X.lineWidth=1;
X.beginPath();X.arc(chx,chy,ch.size+2,0,Math.PI*2);X.stroke();
// Chest emoji (larger)
X.globalAlpha=1;X.font='26px serif';X.textAlign='center';X.textBaseline='middle';
X.fillText('💰',chx,chy+Math.sin(gs.time*0.1)*3);
// Sparkle particles at corners
for(let si=0;si<4;si++){
  const sa=si*(Math.PI/2)+gs.time*0.04;
  const sr=ch.size+4+Math.sin(gs.time*0.15+si)*4;
  X.globalAlpha=(0.4+pulse*0.5)*Math.abs(Math.sin(gs.time*0.08+si*1.3));
  X.fillStyle='#fffde0';X.beginPath();X.arc(chx+Math.cos(sa)*sr,chy+Math.sin(sa)*sr,2,0,Math.PI*2);X.fill();
}
X.restore();X.shadowBlur=0;
}
X.globalAlpha=1;X.shadowBlur=0;

// ===== WEAPON FX =====
for(const fx of gs.weaponFX){
const a=(fx.life/fx.maxLife);
X.globalAlpha=Math.min(1,a*1.5);
X.fillStyle=fx.color;

if(fx.type==='proj'){
  // ── MOONBOLT: crescent shape with moonbeam trail ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.shadowColor='#aaddff';X.shadowBlur=14;
  X.fillStyle='#aaddff';X.globalAlpha=a*0.9;
  // Crescent: full circle minus inner offset circle
  X.beginPath();X.arc(fxX,fxY,fx.size,0,Math.PI*2);X.fill();
  X.fillStyle='#0a180a';
  X.beginPath();X.arc(fxX+fx.size*0.4,fxY-fx.size*0.3,fx.size*0.7,0,Math.PI*2);X.fill();
  // Moonbeam trail
  for(let t=1;t<=3;t++){X.globalAlpha=a*0.18*t;X.fillStyle='#aaddff';X.beginPath();X.arc(fxX-fx.vx*t*1.5,fxY-fx.vy*t*1.5,fx.size*(1-t*0.22),0,Math.PI*2);X.fill();}
  X.restore();

}else if(fx.type==='boomerang'){
  // ── PLAGUE CROWS: visible dark crow silhouette with green corruption glow ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.translate(fxX,fxY);X.rotate(Math.atan2(fx.vy,fx.vx));
  const sz=fx.size*1.8; // bigger than before
  // Glow halo so it's always visible
  X.shadowColor='#44ff88';X.shadowBlur=16+a*8;
  X.globalAlpha=a*0.85;
  // Dark crow body
  X.fillStyle='#1a2e1a';
  X.beginPath();X.ellipse(0,0,sz*1.2,sz*0.45,0,0,Math.PI*2);X.fill();
  // Wings — closed path so they fill properly
  X.fillStyle='#0d1f0d';
  X.beginPath();X.moveTo(-sz*0.6,0);X.lineTo(0,-sz*1.6);X.lineTo(sz*0.6,0);X.closePath();X.fill();
  // Wing highlight edge (bright green)
  X.fillStyle='#44ff88';X.globalAlpha=a*0.5;
  X.beginPath();X.moveTo(-sz*0.5,0);X.lineTo(0,-sz*1.4);X.lineTo(sz*0.5,0);X.closePath();X.fill();
  // Glowing eye
  X.globalAlpha=a;X.fillStyle='#88ffaa';
  X.beginPath();X.arc(sz*0.6,0,sz*0.2,0,Math.PI*2);X.fill();
  // Corruption trail
  for(let t=1;t<=4;t++){X.globalAlpha=a*0.18;X.fillStyle='#44ff88';X.shadowBlur=0;X.beginPath();X.arc(-fx.vx*t*1.5,-fx.vy*t*1.5,sz*0.35,0,Math.PI*2);X.fill();}
  X.restore();

}else if(fx.type==='wave'){
  // ── MIRA'S CURSE: green-purple poison cloud with skull ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.globalAlpha=a*0.65;X.shadowColor='#8855cc';X.shadowBlur=18;
  X.fillStyle='#8855cc';X.beginPath();X.arc(fxX,fxY,fx.size,0,Math.PI*2);X.fill();
  X.fillStyle='#4422aa';X.beginPath();X.arc(fxX+fx.size*0.3,fxY-fx.size*0.2,fx.size*0.6,0,Math.PI*2);X.fill();
  X.globalAlpha=a*0.9;X.font='12px serif';X.textAlign='center';X.textBaseline='middle';
  X.fillText('💀',fxX,fxY);
  // Wispy trail
  for(let t=1;t<=4;t++){X.globalAlpha=a*0.1;X.fillStyle='#cc44ff';X.beginPath();X.arc(fxX-fx.vx*t*2,fxY-fx.vy*t*2,fx.size*(0.9-t*0.15),0,Math.PI*2);X.fill();}
  X.restore();

}else if(fx.type==='pierce'){
  // ── ALDRIC'S LANCE: long spear with light trail ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  const ang=Math.atan2(fx.vy,fx.vx);
  X.save();X.translate(fxX,fxY);X.rotate(ang);
  X.globalAlpha=a;X.shadowColor='#4488ff';X.shadowBlur=16;
  // Shaft
  X.fillStyle='#aabbcc';X.fillRect(-32,-3,60,6);
  // Tip
  X.fillStyle='#4488ff';X.beginPath();X.moveTo(28,-5);X.lineTo(46,0);X.lineTo(28,5);X.closePath();X.fill();
  // Tail
  X.fillStyle='#224488';X.fillRect(-36,-4,12,8);
  // Light trail
  for(let t=1;t<=4;t++){X.globalAlpha=a*0.12;X.fillStyle='#aaddff';X.fillRect(-30-t*8,-2,12,4);}
  X.restore();

}else if(fx.type==='axe'){
  // ── PIP'S PEBBLE: spinning stone with dust ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.translate(fxX,fxY);X.rotate(fx.rot||0);
  X.globalAlpha=a;X.shadowColor='#ffcc44';X.shadowBlur=8;
  X.fillStyle='#ddaa44';X.beginPath();
  for(let s=0;s<5;s++){const sa=s*(Math.PI*2/5)-(Math.PI/2);X.lineTo(Math.cos(sa)*fx.size,Math.sin(sa)*fx.size);}X.closePath();X.fill();
  X.fillStyle='#aa7722';X.beginPath();X.arc(0,0,fx.size*0.5,0,Math.PI*2);X.fill();
  // Dust trail
  X.restore();
  for(let t=1;t<=3;t++){X.globalAlpha=a*0.15;X.fillStyle='#ffcc44';X.beginPath();X.arc(fxX-fx.vx*t,fxY-fx.vy*t,fx.size*0.3,0,Math.PI*2);X.fill();}

}else if(fx.type==='aura'){
  // ── HERALD'S SHOUT: expanding rune ring ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.globalAlpha=a*0.9;X.strokeStyle='#ffaa22';X.lineWidth=4-a*2;X.shadowColor='#ffaa22';X.shadowBlur=18;
  const r=fx.r*(1.1-a*0.2);
  X.beginPath();X.arc(fxX,fxY,r,0,Math.PI*2);X.stroke();
  // Second inner ring
  X.globalAlpha=a*0.4;X.lineWidth=2;X.strokeStyle='#fff6cc';
  X.beginPath();X.arc(fxX,fxY,r*0.65,0,Math.PI*2);X.stroke();
  // Rune marks
  X.globalAlpha=a*0.7;X.font='12px serif';X.textAlign='center';X.textBaseline='middle';
  const runeStr='ᚠᚱᚢᚦᚩ';
  for(let ri=0;ri<5;ri++){const ra=ri*(Math.PI*2/5)+gs.time*0.04;X.fillStyle='#ffcc44';X.fillText(runeStr[ri],fxX+Math.cos(ra)*r,fxY+Math.sin(ra)*r);}
  X.restore();

}else if(fx.type==='bomb'){
  // ── THERON'S HAMMER: orange shockwave + impact lines ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.globalAlpha=a*0.8;X.fillStyle='#ff6622';X.shadowColor='#ff6622';X.shadowBlur=22;
  X.beginPath();X.arc(fxX,fxY,fx.range*(1.05-a),0,Math.PI*2);X.fill();
  // Inner flash
  X.globalAlpha=a*a*0.6;X.fillStyle='#ffcc44';
  X.beginPath();X.arc(fxX,fxY,fx.range*0.55*(1.1-a),0,Math.PI*2);X.fill();
  // Impact cracks
  X.globalAlpha=a*0.7;X.strokeStyle='#ffaa44';X.lineWidth=2;
  for(let li=0;li<8;li++){const la=li*(Math.PI/4);const ld=fx.range*(0.6+a*0.4);
    X.beginPath();X.moveTo(fxX,fxY);X.lineTo(fxX+Math.cos(la)*ld,fxY+Math.sin(la)*ld);X.stroke();}
  X.restore();

}else if(fx.type==='orb'){
  // ── LYSARA'S ORB: arcane glowing sphere with particle ring ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.shadowColor='#cc44ff';X.shadowBlur=20;X.globalAlpha=0.9;
  const grad=X.createRadialGradient(fxX-fx.size*0.3,fxY-fx.size*0.3,1,fxX,fxY,fx.size);
  grad.addColorStop(0,'#ffffff');grad.addColorStop(0.4,'#ee88ff');grad.addColorStop(1,'#6600aa');
  X.fillStyle=grad;X.beginPath();X.arc(fxX,fxY,fx.size,0,Math.PI*2);X.fill();
  // Arcane ring
  X.strokeStyle='#dd88ff';X.lineWidth=1.5;X.globalAlpha=0.5+Math.sin(gs.time*0.25)*0.2;
  X.beginPath();X.arc(fxX,fxY,fx.size*1.8,0,Math.PI*2);X.stroke();
  X.restore();

}else if(fx.type==='arrow'){
  // ── MOON ARROW: thin white arrow with moonlight streak ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  const ang=fx.rot||Math.atan2(fx.vy,fx.vx);
  X.save();X.translate(fxX,fxY);X.rotate(ang);
  X.globalAlpha=a;X.shadowColor='#ffffff';X.shadowBlur=10;
  // Shaft
  X.strokeStyle='#dddddd';X.lineWidth=2;X.beginPath();X.moveTo(-14,0);X.lineTo(14,0);X.stroke();
  // Arrowhead
  X.fillStyle='#ffffff';X.beginPath();X.moveTo(14,0);X.lineTo(8,-4);X.lineTo(8,4);X.closePath();X.fill();
  // Fletching
  X.strokeStyle='#88ccff';X.lineWidth=1.5;
  X.beginPath();X.moveTo(-10,-3);X.lineTo(-14,0);X.lineTo(-10,3);X.stroke();
  // Streak
  for(let t=1;t<=4;t++){X.globalAlpha=a*0.12;X.strokeStyle='#aaddff';X.lineWidth=1.5;X.beginPath();X.moveTo(-14-t*4,0);X.lineTo(-10-t*4,0);X.stroke();}
  X.restore();

}else if(fx.type==='pie_flight'){
  // ── FIRE FLASK: spinning glass bottle with fire trail ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.translate(fxX,fxY);X.rotate(fx.rot||0);
  X.globalAlpha=a;X.shadowColor='#ff8822';X.shadowBlur=14;
  // Fire trail behind
  for(let t=1;t<=3;t++){X.globalAlpha=a*(0.35-t*0.1);X.fillStyle=t===1?'#ffcc44':'#ff6622';X.beginPath();X.arc(-t*5,t*2,fx.size*(1-t*0.2),0,Math.PI*2);X.fill();}
  X.globalAlpha=a;
  // Flask body (rounded bottle shape)
  X.fillStyle='#553311';X.beginPath();X.roundRect(-fx.size*0.55,-fx.size*0.9,fx.size*1.1,fx.size*1.6,fx.size*0.4);X.fill();
  // Glass glint
  X.fillStyle='rgba(255,200,100,0.55)';X.beginPath();X.roundRect(-fx.size*0.55,-fx.size*0.9,fx.size*1.1,fx.size*1.6,fx.size*0.4);X.fill();
  // Neck
  X.fillStyle='#443322';X.fillRect(-fx.size*0.2,-fx.size*1.35,fx.size*0.4,fx.size*0.55);
  // Cork
  X.fillStyle='#8B6914';X.beginPath();X.roundRect(-fx.size*0.22,-fx.size*1.52,fx.size*0.44,fx.size*0.28,2);X.fill();
  // Flame visible inside
  X.globalAlpha=a*0.9;X.fillStyle='#ffaa00';X.beginPath();X.arc(0,0,fx.size*0.38,0,Math.PI*2);X.fill();
  X.fillStyle='#ffee44';X.beginPath();X.arc(0,fx.size*0.05,fx.size*0.2,0,Math.PI*2);X.fill();
  X.restore();

}else if(fx.type==='fire_patch'){
  // ── FIRE PATCH: burning ground circle ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.globalAlpha=a*0.55;X.shadowColor='#ff6622';X.shadowBlur=20;
  // Ground scorch
  X.fillStyle='#441100';X.beginPath();X.ellipse(fxX,fxY,fx.r,fx.r*0.5,0,0,Math.PI*2);X.fill();
  // Flame tongues
  X.globalAlpha=a*0.7;
  for(let fi=0;fi<8;fi++){
    const fa=fi*(Math.PI*2/8)+gs.time*0.08;
    const fd=fx.r*(0.5+Math.sin(gs.time*0.2+fi)*0.2);
    const grad2=X.createRadialGradient(fxX+Math.cos(fa)*fd,fxY+Math.sin(fa)*fd*0.5,0,fxX+Math.cos(fa)*fd,fxY+Math.sin(fa)*fd*0.5,12);
    grad2.addColorStop(0,'#ffee44');grad2.addColorStop(0.5,'#ff6622');grad2.addColorStop(1,'rgba(200,30,0,0)');
    X.fillStyle=grad2;X.beginPath();X.arc(fxX+Math.cos(fa)*fd,fxY+Math.sin(fa)*fd*0.5,12,0,Math.PI*2);X.fill();
  }
  X.restore();

}else if(fx.type==='whip_arc'){
  // ── FLAME WHIP: blazing arc sweep across facing side ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.translate(fxX,fxY);
  X.globalAlpha=a*0.82;X.shadowColor='#ff5500';X.shadowBlur=22;
  // Outer fire arc
  X.strokeStyle='#ff5500';X.lineWidth=6*(a*0.7+0.3);
  X.beginPath();X.arc(0,0,fx.r*0.92,fx.ang-Math.PI*0.75,fx.ang+Math.PI*0.75);X.stroke();
  // Inner hot core
  X.globalAlpha=a*0.6;X.strokeStyle='#ffcc44';X.lineWidth=3;
  X.beginPath();X.arc(0,0,fx.r*0.85,fx.ang-Math.PI*0.65,fx.ang+Math.PI*0.65);X.stroke();
  // Tip sparks
  for(let si=0;si<6;si++){
    const sa=fx.ang-Math.PI*0.7+si*(Math.PI*1.4/5);
    const sd=fx.r*(0.88+Math.random()*0.16);
    X.globalAlpha=a*(0.3+Math.random()*0.5);
    X.fillStyle=si%2===0?'#ff8822':'#ffee44';
    X.beginPath();X.arc(Math.cos(sa)*sd,Math.sin(sa)*sd,3+Math.random()*3,0,Math.PI*2);X.fill();
  }
  X.restore();

}else if(fx.type==='vortex_pull'){
  // ── VOID MAW: purple gravity spiral sucking inward ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  const prog=1-(fx.life/fx.maxLife);
  X.save();X.translate(fxX,fxY);X.rotate(gs.time*0.12);
  // Outer ring darkening as it pulls
  X.globalAlpha=a*0.35+prog*0.3;X.strokeStyle='#8800ff';X.lineWidth=2+prog*4;X.shadowColor='#cc44ff';X.shadowBlur=28;
  X.beginPath();X.arc(0,0,fx.r*(0.9+Math.sin(gs.time*0.15)*0.08),0,Math.PI*2);X.stroke();
  // 3 spiral arms
  for(let arm=0;arm<3;arm++){
    X.globalAlpha=a*0.5;X.strokeStyle=arm===0?'#8800ff':'#cc44ff';X.lineWidth=1.5;
    X.beginPath();
    for(let t=0;t<60;t++){
      const r2=fx.r*(0.88-t/60*0.88);const ang6=(arm*(Math.PI*2/3))+t*0.22+gs.time*0.1;
      t===0?X.moveTo(Math.cos(ang6)*r2,Math.sin(ang6)*r2):X.lineTo(Math.cos(ang6)*r2,Math.sin(ang6)*r2);
    }
    X.stroke();
  }
  // Core void
  X.globalAlpha=0.6+prog*0.3;
  const vGrad=X.createRadialGradient(0,0,0,0,0,fx.r*0.25);
  vGrad.addColorStop(0,'rgba(40,0,80,0.9)');vGrad.addColorStop(1,'rgba(80,0,180,0)');
  X.fillStyle=vGrad;X.beginPath();X.arc(0,0,fx.r*0.25,0,Math.PI*2);X.fill();
  X.restore();

}else if(fx.type==='scythe_arc'){
  // ── SOUL SCYTHE: ghostly purple reaping arc ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  X.save();X.translate(fxX,fxY);
  X.globalAlpha=a*0.85;X.shadowColor='#9955ff';X.shadowBlur=20;
  // Arc stroke
  X.strokeStyle='#9955ff';X.lineWidth=8*(a*0.6+0.4);
  X.beginPath();X.arc(0,0,fx.r*0.9,fx.ang-Math.PI*0.8,fx.ang+Math.PI*0.8);X.stroke();
  // Ghost echo slightly larger
  X.globalAlpha=a*0.25;X.strokeStyle='#cc88ff';X.lineWidth=3;
  X.beginPath();X.arc(0,0,fx.r,fx.ang-Math.PI*0.82,fx.ang+Math.PI*0.82);X.stroke();
  // Soul sparks along the arc
  for(let si=0;si<8;si++){
    const sa=fx.ang-Math.PI*0.75+si*(Math.PI*1.5/7);
    X.globalAlpha=a*(0.4+Math.random()*0.5);
    X.fillStyle=si%2===0?'#9955ff':'#ffffff';
    X.beginPath();X.arc(Math.cos(sa)*fx.r*0.88,Math.sin(sa)*fx.r*0.88,2+Math.random()*3,0,Math.PI*2);X.fill();
  }
  X.restore();

}else if(fx.type==='nova_burst'){
  // ── FROST NOVA: crystalline ice ring radiating outward ──
  const fxX=fx.x-cx,fxY=fx.y-cy;
  const expand=1-a; // starts small, grows
  X.save();X.translate(fxX,fxY);X.rotate(gs.time*0.03);
  X.globalAlpha=a*0.8;X.strokeStyle='#88ddff';X.lineWidth=4;X.shadowColor='#aaeeff';X.shadowBlur=18;
  X.beginPath();X.arc(0,0,fx.r*(0.3+expand*0.7),0,Math.PI*2);X.stroke();
  // Ice crystal spikes radiating out
  X.globalAlpha=a*0.7;X.fillStyle='#ccf4ff';
  for(let ci=0;ci<8;ci++){
    const ca=ci*(Math.PI*2/8);
    const cd=fx.r*(0.35+expand*0.65);
    X.save();X.translate(Math.cos(ca)*cd,Math.sin(ca)*cd);X.rotate(ca);
    X.beginPath();X.moveTo(0,-6);X.lineTo(4,0);X.lineTo(0,6);X.lineTo(-4,0);X.closePath();X.fill();
    X.restore();
  }
  // Inner white flash
  X.globalAlpha=a*a*0.5;X.fillStyle='#ffffff';
  X.beginPath();X.arc(0,0,fx.r*(0.25+expand*0.18),0,Math.PI*2);X.fill();
  X.restore();
}
X.globalAlpha=1;
}

// ===== ENEMIES =====
for(const e of gs.enemies){
if(!e.active)continue;
const ex=e.x-cx,ey=e.y-cy+Math.sin(e.bob)*2;
// Offscreen cull — don't draw enemies outside the viewport
if(ex<-e.size*4||ex>C.width+e.size*4||ey<-e.size*4||ey>C.height+e.size*4)continue;
X.globalAlpha=1;
X.fillStyle=e.flash>0?'#ffffff':e.color;
if(e.isBoss){drawBoss(e,ex,ey);
}else if(e.type==='werewolf'){
  // ── WEREWOLF: hunched beast with fangs and claws ──
  const wc=e.flash>0?'#ffffff':e.color;
  X.save();X.shadowColor='#ff8844';X.shadowBlur=0; // shadow removed for perf
  const wbob=Math.sin(e.bob*1.4)*0.28;
  // Hunched body
  X.fillStyle=wc;X.beginPath();X.ellipse(ex,ey+e.size*0.12,e.size*0.65,e.size*0.72,wbob*0.3,0,Math.PI*2);X.fill();
  // Head (larger, animalistic — tilted toward player)
  X.fillStyle=e.flash>0?'#ffffff':'#775533';X.beginPath();X.ellipse(ex,ey-e.size*0.62,e.size*0.5,e.size*0.42,wbob*0.5,0,Math.PI*2);X.fill();
  // Snout
  X.fillStyle=e.flash>0?'#ffeecc':'#664422';X.beginPath();X.ellipse(ex+e.size*0.12,ey-e.size*0.52,e.size*0.28,e.size*0.22,0.3,0,Math.PI*2);X.fill();
  // Fangs
  X.fillStyle='#eeeecc';X.beginPath();X.moveTo(ex-e.size*0.1,ey-e.size*0.44);X.lineTo(ex-e.size*0.06,ey-e.size*0.32);X.lineTo(ex-e.size*0.02,ey-e.size*0.44);X.closePath();X.fill();
  X.beginPath();X.moveTo(ex+e.size*0.1,ey-e.size*0.44);X.lineTo(ex+e.size*0.14,ey-e.size*0.32);X.lineTo(ex+e.size*0.18,ey-e.size*0.44);X.closePath();X.fill();
  // Glowing amber eyes
  X.shadowColor='#ffaa00';X.shadowBlur=10;X.fillStyle=e.flash>0?'#ff8888':'#ff8800';
  X.beginPath();X.arc(ex-e.size*0.18,ey-e.size*0.68,e.size*0.1,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(ex+e.size*0.18,ey-e.size*0.68,e.size*0.1,0,Math.PI*2);X.fill();
  // Ears (pointy)
  X.fillStyle=wc;X.shadowBlur=0;
  X.beginPath();X.moveTo(ex-e.size*0.3,ey-e.size*0.82);X.lineTo(ex-e.size*0.46,ey-e.size*1.12);X.lineTo(ex-e.size*0.12,ey-e.size*0.88);X.closePath();X.fill();
  X.beginPath();X.moveTo(ex+e.size*0.3,ey-e.size*0.82);X.lineTo(ex+e.size*0.46,ey-e.size*1.12);X.lineTo(ex+e.size*0.12,ey-e.size*0.88);X.closePath();X.fill();
  // Arms with claw swipe
  X.strokeStyle=wc;X.lineWidth=e.size*0.24;X.lineCap='round';
  const swipe=Math.sin(e.bob*2)*0.55;
  X.beginPath();X.moveTo(ex-e.size*0.55,ey-e.size*0.15);X.lineTo(ex-e.size*1.15,ey+e.size*0.05+swipe*e.size*0.4);X.stroke();
  X.beginPath();X.moveTo(ex+e.size*0.55,ey-e.size*0.15);X.lineTo(ex+e.size*1.15,ey+e.size*0.05-swipe*e.size*0.4);X.stroke();
  // Legs
  X.lineWidth=e.size*0.22;
  X.beginPath();X.moveTo(ex-e.size*0.28,ey+e.size*0.72);X.lineTo(ex-e.size*0.38,ey+e.size*1.12+Math.sin(e.bob)*e.size*0.18);X.stroke();
  X.beginPath();X.moveTo(ex+e.size*0.28,ey+e.size*0.72);X.lineTo(ex+e.size*0.38,ey+e.size*1.12+Math.sin(e.bob+1.2)*e.size*0.18);X.stroke();
  X.restore();X.shadowBlur=0;
}else if(e.type==='skeleton_wall'){
  // ── SKELETON WALL SEGMENT: bone stake with skull, lashed crossbones ──
  const rise=Math.min(1,e._riseAnim||1);
  const sc=e.flash>0?'#ffffff':'#c8b870';
  const scd=e.flash>0?'#ffffff':'#6a4820';
  X.save();X.shadowColor='#aa9955';X.shadowBlur=e.flash>0?0:8;
  // Wooden stake post
  X.fillStyle=scd;
  const postH=e.size*2.6*rise;
  X.beginPath();X.roundRect(ex-e.size*0.2,ey+e.size*0.45,e.size*0.4,postH,2);X.fill();
  // Lash bindings on post
  X.strokeStyle='#4a2c10';X.lineWidth=e.size*0.09;
  for(let li=0;li<2;li++){const ly=ey+e.size*(0.65+li*0.95)*rise;X.beginPath();X.moveTo(ex-e.size*0.25,ly);X.lineTo(ex+e.size*0.25,ly);X.stroke();}
  // Horizontal arm bone (crossbar)
  X.fillStyle=sc;X.lineWidth=e.size*0.22;X.lineCap='round';
  X.strokeStyle=sc;
  X.beginPath();X.moveTo(ex-e.size*0.85,ey-e.size*0.35*rise);X.lineTo(ex+e.size*0.85,ey-e.size*0.35*rise);X.stroke();
  // Knuckle balls at crossbar ends
  X.beginPath();X.arc(ex-e.size*0.85,ey-e.size*0.35*rise,e.size*0.14,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(ex+e.size*0.85,ey-e.size*0.35*rise,e.size*0.14,0,Math.PI*2);X.fill();
  // Skull on top
  X.shadowColor='#ddcc88';X.shadowBlur=e.flash>0?0:12;
  X.beginPath();X.arc(ex,ey-e.size*1.18*rise,e.size*0.44,0,Math.PI*2);X.fill();
  // Skull lower jaw
  X.fillStyle=e.flash>0?'#ffffff':'#b8a458';
  X.beginPath();X.arc(ex+e.size*0.04,ey-e.size*0.96*rise,e.size*0.28,0,Math.PI);X.fill();
  // Eye sockets
  X.fillStyle='#1a0e00';X.shadowBlur=0;
  X.beginPath();X.arc(ex-e.size*0.16,ey-e.size*1.22*rise,e.size*0.13,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(ex+e.size*0.16,ey-e.size*1.22*rise,e.size*0.13,0,Math.PI*2);X.fill();
  // Nose hole
  X.beginPath();X.arc(ex,ey-e.size*1.1*rise,e.size*0.07,0,Math.PI*2);X.fill();
  // Teeth gap
  for(let ti=0;ti<3;ti++){X.fillRect(ex-e.size*0.22+ti*e.size*0.22,ey-e.size*0.98*rise,e.size*0.1,e.size*0.13);}
  // Rib bones on stake (impaled)
  X.strokeStyle=sc;X.lineWidth=e.size*0.08;
  for(let ri=0;ri<2;ri++){
    const ry=ey+e.size*(0.05+ri*0.5)*rise;
    X.beginPath();X.moveTo(ex-e.size*0.55,ry);X.bezierCurveTo(ex-e.size*0.7,ry+e.size*0.1,ex+e.size*0.7,ry+e.size*0.1,ex+e.size*0.55,ry);X.stroke();
  }
  // HP bar (only when damaged)
  if(e.hp<e.maxHp){
    const hpPct=e.hp/e.maxHp;
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(ex-e.size,ey+e.size*0.45,e.size*2,4);
    X.fillStyle=hpPct>0.5?'#55ff55':'#ff4444';X.fillRect(ex-e.size,ey+e.size*0.45,e.size*2*hpPct,4);
  }
  X.restore();
}else{
  // Zombie body: draw a proper zombie sprite
  const zc=e.flash>0?'#ffffff':e.color;
  X.save();
  // Body (rounded rectangle, slightly wider than tall)
  X.fillStyle=zc;
  X.beginPath();X.roundRect(ex-e.size*0.55,ey-e.size*0.4,e.size*1.1,e.size*1.1,4);X.fill();
  // Head
  X.fillStyle=e.flash>0?'#ffffff':'#7a9a5a';
  X.beginPath();X.arc(ex,ey-e.size*0.55,e.size*0.45,0,Math.PI*2);X.fill();
  // Eyes (glowing red dots)
  X.fillStyle=e.flash>0?'#ff8888':'#ff2200';
  X.beginPath();X.arc(ex-e.size*0.15,ey-e.size*0.58,e.size*0.1,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(ex+e.size*0.15,ey-e.size*0.58,e.size*0.1,0,Math.PI*2);X.fill();
  // Arms (outstretched like a zombie)
  X.strokeStyle=zc;X.lineWidth=e.size*0.22;X.lineCap='round';
  const armAngle=Math.sin(e.bob*1.5)*0.3;
  X.beginPath();X.moveTo(ex-e.size*0.55,ey-e.size*0.1);X.lineTo(ex-e.size*1.1,ey-e.size*0.1+Math.sin(armAngle)*e.size*0.3);X.stroke();
  X.beginPath();X.moveTo(ex+e.size*0.55,ey-e.size*0.1);X.lineTo(ex+e.size*1.1,ey-e.size*0.1+Math.sin(-armAngle)*e.size*0.3);X.stroke();
  // Legs
  X.lineWidth=e.size*0.2;
  X.beginPath();X.moveTo(ex-e.size*0.2,ey+e.size*0.7);X.lineTo(ex-e.size*0.3,ey+e.size*1.1+Math.sin(e.bob)*e.size*0.15);X.stroke();
  X.beginPath();X.moveTo(ex+e.size*0.2,ey+e.size*0.7);X.lineTo(ex+e.size*0.3,ey+e.size*1.1+Math.sin(e.bob+1)*e.size*0.15);X.stroke();
  X.restore();
}
X.globalAlpha=1;
// Frozen visual: ice crystal overlay
if(e.frozen>0){
const fa2=Math.min(1,e.frozen/60);
X.save();X.globalAlpha=fa2*0.55;X.shadowColor='#88ddff';X.shadowBlur=12;
X.fillStyle='rgba(136,221,255,0.4)';X.beginPath();X.arc(ex,ey,e.size*1.2,0,Math.PI*2);X.fill();
X.strokeStyle='#aaeeff';X.lineWidth=1.5;
for(let fi2=0;fi2<4;fi2++){const fc=fi2*(Math.PI/2)+0.3;X.beginPath();X.moveTo(ex,ey);X.lineTo(ex+Math.cos(fc)*e.size*1.1,ey+Math.sin(fc)*e.size*1.1);X.stroke();}
X.restore();
}
// On-fire visual effect
if(e.onFire>0){
const fa=Math.min(1,e.onFire/180);
X.save();X.globalAlpha=fa*0.82;X.shadowColor='#ff6622';X.shadowBlur=16;
for(let fi=0;fi<5;fi++){
const fang=fi*(Math.PI*2/5)+gs.time*0.2+e.bob*0.5;
const fdr=e.size*(0.38+Math.sin(gs.time*0.28+fi)*0.14);
const fgx=ex+Math.cos(fang)*fdr,fgy=ey-e.size*0.35+Math.sin(fang)*fdr*0.5;
const fgr=X.createRadialGradient(fgx,fgy,0,fgx,fgy,e.size*0.6);
fgr.addColorStop(0,'#ffee44');fgr.addColorStop(0.45,'#ff5500');fgr.addColorStop(1,'rgba(200,30,0,0)');
X.fillStyle=fgr;X.beginPath();X.arc(fgx,fgy,e.size*0.6,0,Math.PI*2);X.fill();
}
X.restore();
}
// HP bar (show when damaged)
if(e.hp<e.maxHp){
const bw=e.size*2;const bx=ex-e.size;const by=ey-e.size-8;
X.fillStyle='#333';X.fillRect(bx,by,bw,4);
X.fillStyle=e.isBoss?'#ff4444':'#44ff88';
X.fillRect(bx,by,bw*(e.hp/e.maxHp),4);
}
// Boss name
if(e.isBoss){
X.font='bold 11px monospace';X.fillStyle='#ff4444';X.strokeStyle='#000';X.lineWidth=2;X.textAlign='center';
X.strokeText(e.name,ex,ey-e.size-16);X.fillText(e.name,ex,ey-e.size-16);
}}

// ===== REMOTE PLAYERS =====
for(const[rid,rp] of Object.entries(remotePlayers)){
  const rx=rp.x-cx,ry=rp.y-cy;
  const rimg=remoteAvatarImgs[rid];
  X.save();
  if(rp.downed){
    // ---- DOWNED: draw horizontal/fallen with red pulsing glow ----
    const pulse=0.5+Math.sin(gs.time*0.15)*0.5;
    X.shadowColor='#ff4422';X.shadowBlur=12+pulse*10;
    X.globalAlpha=0.85;
    // Fallen body (rotated 90°)
    X.translate(rx,ry+8);X.rotate(Math.PI/2);
    X.beginPath();X.arc(0,0,18,0,Math.PI*2);X.clip();
    if(rimg){X.drawImage(rimg,-18,-18,36,36);}

// ===== CLAIRVOYANCE DEBUG OVERLAY ===== (toggle with ` key)
function drawClairvoyance(){
  // FPS tracking
  gs._fpsCount++;
  const now=performance.now();
  if(now-gs._fpsLast>=500){
    gs._fpsSmooth=Math.round(gs._fpsCount*2);
    gs._fpsCount=0;gs._fpsLast=now;
  }
  // Collect FX type counts
  const fxTypes={};for(const fx of gs.weaponFX){fxTypes[fx.type]=(fxTypes[fx.type]||0)+1;}
  // Weapon FX warnings
  const warnings=[];
  for(const w of gs.weapons){
    const def=WEAPONS[w.id];if(!def)continue;
    const t=def.type;
    const typeMap={projectile:'proj',boomerang:'boomerang',pierce:'pierce',axe:'axe',multishot:'arrow',wave:'wave',orbit:'orbit',bomb:'pie_flight',fire_patch:'fire_patch',aura:'aura'};
    const expectedType=typeMap[t]||t;
    const count=fxTypes[expectedType]||0;
    if(t!=='aura'&&t!=='orbit'&&count===0)warnings.push('⚠️ '+def.name+' ('+def.type+'): 0 FX visible');
  }
  // Draw panel
  const pw=310,lines=8+Object.keys(fxTypes).length+warnings.length;
  const ph=14+lines*16;const px2=C.width-pw-8,py2=8;
  X.save();
  X.fillStyle='rgba(0,10,20,0.88)';X.beginPath();X.roundRect(px2,py2,pw,ph,8);X.fill();
  X.strokeStyle='rgba(0,200,255,0.5)';X.lineWidth=1;X.beginPath();X.roundRect(px2,py2,pw,ph,8);X.stroke();
  X.font='bold 11px monospace';X.fillStyle='#00ccff';X.textAlign='left';X.textBaseline='top';
  let ly=py2+8;const lx=px2+10;
  X.fillText('⚡ CLAIRVOYANCE  [` to hide]',lx,ly);ly+=18;
  X.fillStyle='#aaddff';X.font='10px monospace';
  X.fillText('FPS: '+gs._fpsSmooth+'  |  Frame: '+gs.frame,lx,ly);ly+=14;
  X.fillText('State: '+gs.state,lx,ly);ly+=14;
  X.fillText('Enemies: '+gs.enemies.filter(e=>e.active).length+'  |  FX total: '+gs.weaponFX.length,lx,ly);ly+=14;
  X.fillText('Particles: '+gs.particles.length+'  |  Floats: '+gs.floatTexts.length,lx,ly);ly+=14;
  X.fillText('Pills: '+gs.pills.length+'  |  Gold: '+gs.goldGems.length,lx,ly);ly+=14;
  X.fillStyle='#88ffcc';
  X.fillText('── FX by type ──',lx,ly);ly+=14;
  for(const[t,n] of Object.entries(fxTypes)){X.fillStyle='#66ffaa';X.fillText('  '+t+': '+n,lx,ly);ly+=13;}
  if(warnings.length===0){X.fillStyle='#44ff88';X.fillText('✓ All weapon FX active',lx,ly);ly+=13;}
  else{for(const w of warnings){X.fillStyle='#ff6644';X.fillText(w,lx,ly);ly+=13;}}
  X.restore();
}

// ===== PROGRESS SAVE / LOAD =====
function saveRun(){
  try{
    // ── Transfer run gold to persistent bank ──────────────────────────
    const meta=loadMeta();meta.powerups=meta.powerups||{};
    const goldMult=1+getMetaStat('gold_mult');
    const tierBonus=gs.streakTier*30;          // +30g per tier reached
    const winBonus=gs.survived?150:0;           // +150g for winning
    const earned=Math.floor(gs.gold*goldMult)+tierBonus+winBonus;
    meta.goldBank=(meta.goldBank||0)+earned;
    meta.totalGoldEarned=(meta.totalGoldEarned||0)+earned;
    saveMeta(meta);
    refreshMetaCache();
    gs.metaGoldEarned=earned; // shown on game over screen

    // ── Save run history (unchanged) ──────────────────────────────────
    const prev=JSON.parse(localStorage.getItem('outbreak_progress')||'{}');
    const run={kills:gs.kills,level:gs.level,tier:gs.streakTier,time:Math.floor(gs.gameTime),gold:gs.gold,date:Date.now()};
    const best=prev.best||{};
    if((run.kills>=(best.kills||0))||!best.kills){
      best.kills=Math.max(run.kills,best.kills||0);
      best.level=Math.max(run.level,best.level||0);
      best.tier=Math.max(run.tier,best.tier||0);
      best.time=Math.max(run.time,best.time||0);
    }
    const history=(prev.history||[]);
    history.unshift(run);if(history.length>20)history.pop();
    localStorage.setItem('outbreak_progress',JSON.stringify({best,history,totalKills:(prev.totalKills||0)+run.kills,totalRuns:(prev.totalRuns||0)+1}));
  }catch(e){}
}
function loadProgress(){
  try{return JSON.parse(localStorage.getItem('outbreak_progress')||'{}');}catch(e){return {};}
}

const filtered=META_PU_KEYS.filter(k=>gs.puCategory==='all'||META_POWERUPS[k].category===gs.puCategory);
const cols=4,cw=C.width<700?Math.floor((C.width-40)/Math.min(cols,filtered.length)):180,ch=160,gap=10;
const totalW=Math.min(filtered.length,cols)*(cw+gap)-gap;
const startX=C.width/2-totalW/2;const startY=C.height/2-180;
for(let i=0;i<filtered.length;i++){
  const key=filtered[i];const def=META_POWERUPS[key];
  const col=i%cols,row=Math.floor(i/cols);
  const bx=startX+col*(cw+gap),by=startY+row*(ch+gap);
  const lvl=pus[key]||0;const maxed=lvl>=def.maxLvl;
  const cost=maxed?0:metaCost(key);const canAfford=!maxed&&bank>=cost;
  const sel=i===gs.puSelected;

  // Card bg
  X.save();
  if(sel){X.shadowColor=def.color;X.shadowBlur=16;}
  X.fillStyle=sel?'rgba(80,45,160,0.95)':maxed?'rgba(20,40,20,0.9)':'rgba(18,12,40,0.92)';
  X.beginPath();X.roundRect(bx,by,cw,ch,10);X.fill();
  X.strokeStyle=sel?def.color:maxed?'rgba(80,200,80,0.5)':'rgba(80,60,130,0.5)';
  X.lineWidth=sel?2:1;X.beginPath();X.roundRect(bx,by,cw,ch,10);X.stroke();
  X.restore();

  // Emoji
  X.font='30px serif';X.textAlign='center';X.textBaseline='top';
  X.fillText(def.emoji,bx+cw/2,by+10);

  // Name
  X.font='bold 11px monospace';X.textBaseline='top';
  X.fillStyle=maxed?'#88ff88':sel?'#fff':'#ddbbff';
  X.fillText(def.name,bx+cw/2,by+46);

  // Level pips
  const pipW=10,pipGap=3,pipTotal=def.maxLvl*(pipW+pipGap)-pipGap;
  let px3=bx+cw/2-pipTotal/2;
  for(let pi=0;pi<def.maxLvl;pi++){
    X.fillStyle=pi<lvl?def.color:'rgba(255,255,255,0.15)';
    X.beginPath();X.roundRect(px3,by+64,pipW,6,2);X.fill();
    px3+=pipW+pipGap;
  }

  // Desc
  X.font='9px monospace';X.fillStyle='rgba(180,165,210,0.75)';X.textAlign='center';X.textBaseline='top';
  // Wrap at ~20 chars
  const words=def.desc.split(' ');let line='';const lines=[];
  words.forEach(w=>{if((line+w).length>22){lines.push(line.trim());line='';}line+=w+' ';});if(line.trim())lines.push(line.trim());
  lines.slice(0,3).forEach((l,li)=>X.fillText(l,bx+cw/2,by+76+li*12));

  // Cost / maxed / can't afford
  X.font='bold 12px monospace';X.textAlign='center';X.textBaseline='bottom';
  if(maxed){
    X.fillStyle='#88ff88';X.fillText('✓ MAXED',bx+cw/2,by+ch-6);
  }else{
    X.fillStyle=canAfford?'#ffd700':'rgba(150,130,100,0.5)';
    X.fillText((canAfford?'▶ ':'🔒 ')+'BUY: '+cost+'g',bx+cw/2,by+ch-6);
  }
}

// Instructions
X.font='11px monospace';X.fillStyle='rgba(150,130,200,0.55)';X.textAlign='center';X.textBaseline='bottom';
X.fillText('↕↔ Navigate  •  SPACE/Enter to Buy  •  Tab to filter  •  [P/Esc] Close',C.width/2,C.height-8);
}

// ========== GAME LOOP ==========
function loop(){requestAnimationFrame(loop);update();draw()}
loop();
</script>
</body></html>
